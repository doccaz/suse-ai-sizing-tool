                        {!aiState && (
                          <button onClick={lookupAI}
                            className="mx-auto flex items-center gap-2 px-4 py-2 rounded-lg border border-suse-green/40 text-suse-green text-sm hover:bg-suse-green/10 transition-colors">
                            <Brain size={16}/>Ask Claude for sizing estimate{!apiKey && <span className="text-gray-500 text-xs ml-1">(API key needed)</span>}
                          </button>
                        )}
                      </div>
                    )}
                  </div>
                )}
              </div>
              <div className="px-5 py-2 border-t border-suse-border text-[11px] text-gray-600 text-center">Resource estimates are for planning only — adjust to match your actual workload requirements.</div>
            </div>
          </div>
        );
      }

      const LiveTotals = ({ summary }) => (
        <div className="space-y-3">
          <TotalRow icon={Cpu} label="Total vCPU" value={summary.capacity.cpu} demand={summary.demand.cpu} />
          <TotalRow icon={MemoryStick} label="Total RAM (GB)" value={summary.capacity.ram} demand={summary.demand.ram} />
          <TotalRow icon={HardDrive} label="Total Storage (GB)" value={summary.capacity.storage} demand={summary.demand.storage} />
          <TotalRow icon={Layers} label="Total GPUs" value={summary.capacity.gpu} demand={summary.demand.gpu} />
          <div className="pt-2 border-t border-suse-border text-xs text-gray-500">
            {summary.counts.controlPlane} CP · {summary.counts.gpuWorkerNodes} GPU · {summary.counts.generalWorkerNodes} general worker nodes
          </div>
        </div>
      );

      const TotalRow = ({ icon: Icon, label, value, demand }) => (
        <div className="flex items-center justify-between">
          <span className="flex items-center text-sm text-gray-400"><Icon size={16} className="mr-2 text-suse-green" />{label}</span>
          <span className="text-right">
            <span className="text-lg font-bold text-white font-mono">{value}</span>
            <span className="block text-[10px] text-gray-500 font-mono">demand {demand}</span>
          </span>
        </div>
      );

      const DeltaStat = ({ icon: Icon, label, value }) => {
        const ok = value >= 0;
        return (
          <div className={`rounded-md p-3 border ${ok ? 'bg-suse-green/10 border-suse-green/30' : 'bg-red-500/10 border-red-500/30'}`}>
            <div className="flex items-center text-xs text-gray-400 mb-1"><Icon size={13} className="mr-1.5" />{label}</div>
            <div className={`text-xl font-bold font-mono ${ok ? 'text-suse-green' : 'text-red-300'}`}>{value >= 0 ? `+${value}` : value}</div>
          </div>
        );
      };

      /* =====================================================================
         DIAGRAM TAB
      ===================================================================== */
      // One architecture block per cluster: control-plane row + worker plane & services.
      function ClusterArchitecture({ cluster, forPdf, textMain, textSub }) {
        const selectedServices = Object.entries(cluster.services).filter(([, c]) => c.selected).map(([id]) => servicesData[id]);
        const cpNodes = effNodes(cluster.base.controlPlane);
        const gpuNodes = effNodes(cluster.base.gpuWorkerNodes);
        const genNodes = effNodes(cluster.base.generalWorkerNodes);
        const role = CLUSTER_ROLE[cluster.role] || CLUSTER_ROLE.workload;
        const none = <span className={`text-xs italic ${textSub}`}>None — disabled</span>;
        return (
          <div className={`rounded-xl p-4 ${forPdf ? 'border border-gray-300' : 'border border-suse-border bg-suse-bg/30'}`}>
            <h3 className={`text-base font-bold text-center ${textMain}`}>{cluster.name}</h3>
            <p className={`text-[10px] uppercase tracking-wider text-center mb-4 ${textSub}`}>{role.label} cluster</p>

            <div>
              <h4 className={`text-xs font-bold uppercase tracking-wider text-center mb-3 ${textSub}`}>Control Plane</h4>
              <div className="flex justify-center flex-wrap gap-4">
                {cpNodes.length ? cpNodes.map((n, i) => <NodeCard key={n.id} title={`Control Plane ${i + 1}`} node={n} forPdf={forPdf} />) : none}
              </div>
            </div>

            <div className="flex justify-center"><div className={`border-l-2 border-dashed h-6 ${forPdf ? 'border-gray-300' : 'border-suse-border'}`}></div></div>

            <div className={`rounded-xl p-5 ${forPdf ? 'border-2 border-dashed border-[#30BA78]' : 'border-2 border-dashed border-suse-green/40 bg-suse-bg/40'}`}>
              <h4 className="text-sm font-bold uppercase tracking-wider text-center text-suse-green mb-4">Worker Plane &amp; Services</h4>

              {(selectedServices.length > 0 || cluster.customApps.length > 0) && (
                <div className="flex justify-center flex-wrap gap-2 mb-5">
                  {selectedServices.map(s => {
                    const Icon = s.icon;
                    return <span key={s.name} className={`inline-flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-full border ${forPdf ? 'bg-[#30BA78]/10 text-[#0C322C] border-[#30BA78]/40' : 'bg-suse-green/10 text-suse-green border-suse-green/40'}`}><Icon size={13} />{s.name}</span>;
                  })}
                  {cluster.customApps.map(a => (
                    <span key={a.id} className={`inline-flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-full border ${forPdf ? 'bg-gray-100 text-[#0C322C] border-gray-300' : 'bg-suse-border text-gray-200 border-suse-border'}`}><Edit3 size={13} />{a.name}</span>
                  ))}
                </div>
              )}

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <h5 className={`text-xs font-bold uppercase text-center mb-3 ${textSub}`}>GPU-Enabled Workers</h5>
                  <div className="flex justify-center flex-wrap gap-4">
                    {gpuNodes.length ? gpuNodes.map((n, i) => <NodeCard key={n.id} title={`GPU Worker ${i + 1}`} node={n} forPdf={forPdf} />) : none}
                  </div>
                </div>
                <div>
                  <h5 className={`text-xs font-bold uppercase text-center mb-3 ${textSub}`}>General Purpose Workers</h5>
                  <div className="flex justify-center flex-wrap gap-4">
                    {genNodes.length ? genNodes.map((n, i) => <NodeCard key={n.id} title={`GP Worker ${i + 1}`} node={n} forPdf={forPdf} />) : none}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function DiagramTab({ state, summary, virtSummary, forPdf }) {
        const textMain = forPdf ? 'text-[#0C322C]' : 'text-white';
        const textSub = forPdf ? 'text-gray-600' : 'text-gray-400';
        const clusters = state.clusters.filter(c => c.enabled);

        // Physical virtualization layer: which hosts run the fleet's VMs, and across how many sites.
        const vs = virtSummary;
        const physHosts = vs ? (vs.mode === 'pool'
          ? vs.hostCaps.filter(h => h.count > 0).map(h => ({ name: h.name, count: h.count, cores: h.cores, threads: h.threads, ram: h.rawRam, storage: h.storage, gpu: h.gpu }))
          : [{ name: vs.primary.name, count: vs.decided, cores: vs.primary.cores, threads: vs.primary.threads, ram: vs.primary.rawRam, storage: vs.primary.storage, gpu: vs.primary.gpu }]
        ) : [];
        const totalPerSite = physHosts.reduce((s, h) => s + h.count, 0);

        return (
          <div className={`space-y-6 ${forPdf ? '' : 'bg-suse-panel border border-suse-border rounded-xl p-6'}`}>
            {!forPdf && <h2 className={`text-xl font-bold text-center ${textMain}`}>Proposed Architecture</h2>}
            <p className={`text-xs text-center ${forPdf ? '' : '-mt-3'} ${textSub}`}>{clusters.length} cluster{clusters.length !== 1 ? 's' : ''} · {summary.capacity.cpu} vCPU · {summary.capacity.ram} GB RAM · {summary.capacity.gpu} GPU (fleet)</p>

            <div className="space-y-6">
              {clusters.map(c => <ClusterArchitecture key={c.id} cluster={c} forPdf={forPdf} textMain={textMain} textSub={textSub} />)}
            </div>

            {vs && totalPerSite > 0 && (
              <>
                <div className="flex justify-center">
                  <div className={`flex flex-col items-center ${textSub}`}>
                    <div className={`border-l-2 border-dashed h-8 ${forPdf ? 'border-gray-300' : 'border-suse-border'}`}></div>
                    <span className="text-[10px] uppercase tracking-wider">runs as VMs on</span>
                  </div>
                </div>

                <div className={`rounded-xl p-5 ${forPdf ? 'border-2 border-dashed border-gray-300' : 'border-2 border-dashed border-suse-border bg-suse-bg/40'}`}>
                  <div className="flex items-center justify-center gap-2 mb-1">
                    <Boxes size={16} className="text-suse-green" />
                    <h3 className={`text-sm font-bold uppercase tracking-wider text-center ${textSub}`}>Physical Virtualization Layer — SUSE Virtualization (Harvester)</h3>
                  </div>
                  <p className={`text-xs text-center mb-4 ${textSub}`}>
                    {vs.mode === 'pool' ? 'Mixed host inventory' : 'Auto-sized identical hosts'} · {vs.totals.totalHosts} physical host{vs.totals.totalHosts !== 1 ? 's' : ''} total
                    {vs.ft > 0 ? ` · tolerates ${vs.ft} host failure(s)` : ''} · {vs.totals.threads} threads · {vs.totals.ram} GB RAM{vs.totals.gpus ? ` · ${vs.totals.gpus} GPU` : ''}
                  </p>

                  {Array.from({ length: vs.sites }).map((_, siteIdx) => (
                    <div key={siteIdx} className={vs.sites > 1 ? 'mb-4 last:mb-0' : ''}>
                      {vs.sites > 1 && (
                        <h4 className={`text-xs font-bold uppercase text-center mb-3 flex items-center justify-center gap-1.5 ${textSub}`}>
                          <Route size={13} className="text-suse-green" />Site {siteIdx + 1} of {vs.sites} · {totalPerSite} host{totalPerSite !== 1 ? 's' : ''}
                        </h4>
                      )}
                      <div className="flex justify-center flex-wrap gap-4">
                        {physHosts.map((h, i) => <PhysHostCard key={i} host={h} forPdf={forPdf} />)}
                        {vs.ext && (
                          <div className={`rounded-lg shadow-md w-56 flex-shrink-0 overflow-hidden border ${forPdf ? 'bg-white border-gray-300' : 'bg-suse-panel border-suse-border'}`}>
                            <div className={`font-bold p-2.5 flex items-center text-sm ${forPdf ? 'bg-[#0C322C] text-white' : 'bg-suse-border text-white'}`}><Database size={15} className="mr-2 text-suse-green" />External Storage</div>
                            <div className={`p-3 space-y-1.5 text-xs ${forPdf ? 'text-[#0C322C]' : 'text-gray-300'}`}>
                              <div className="flex items-center"><HardDrive size={14} className="mr-2 text-suse-green" />{vs.agg.storage} GB / site</div>
                              <div className={textSub}>{STORAGE_CONN[state.virtualization.storage.connection] || 'External array'}</div>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  ))}

                  {vs.sites > 1 && (
                    <p className={`text-[11px] text-center mt-3 ${textSub}`}>
                      Replicated across {vs.sites} DR sites{state.virtualization.dr.note ? ` — ${state.virtualization.dr.note}` : ''}.
                    </p>
                  )}
                </div>
              </>
            )}
          </div>
        );
      }

      const PhysHostCard = ({ host, forPdf }) => (
        <div className={`rounded-lg shadow-md w-56 flex-shrink-0 overflow-hidden border ${forPdf ? 'bg-white border-gray-300' : 'bg-suse-panel border-suse-border'}`}>
          <div className={`font-bold p-2.5 flex items-center justify-between text-sm ${forPdf ? 'bg-[#0C322C] text-white' : 'bg-suse-border text-white'}`}>
            <span className="flex items-center min-w-0"><Server size={15} className="mr-2 text-suse-green flex-shrink-0" /><span className={forPdf ? 'break-words' : 'truncate'}>{host.name}</span></span>
            <span className={`ml-2 flex-shrink-0 inline-flex items-center leading-none text-xs font-mono px-1.5 py-1 rounded ${forPdf ? 'bg-[#30BA78] text-white' : 'bg-suse-green/20 text-suse-green'}`}>×{host.count}</span>
          </div>
          <div className={`p-3 space-y-1.5 text-xs ${forPdf ? 'text-[#0C322C]' : 'text-gray-300'}`}>
            <div className="flex items-center"><Cpu size={14} className="mr-2 text-suse-green" />{host.cores} cores / {host.threads} threads</div>
            <div className="flex items-center"><MemoryStick size={14} className="mr-2 text-suse-green" />{host.ram} GB RAM</div>
            <div className="flex items-center"><HardDrive size={14} className="mr-2 text-suse-green" />{host.storage} GB local</div>
            {host.gpu ? <div className="flex items-center"><Layers size={14} className="mr-2 text-suse-green" />{host.gpu} GPU</div> : null}
          </div>
        </div>
      );

      const NodeCard = ({ title, node, forPdf }) => (
        <div className={`rounded-lg shadow-md w-56 flex-shrink-0 overflow-hidden border ${forPdf ? 'bg-white border-gray-300' : 'bg-suse-panel border-suse-border'}`}>
          <div className={`font-bold p-2.5 flex items-center text-sm ${forPdf ? 'bg-[#0C322C] text-white' : 'bg-suse-border text-white'}`}><Server size={15} className="mr-2 text-suse-green" />{title}</div>
          <div className={`p-3 space-y-1.5 text-xs ${forPdf ? 'text-[#0C322C]' : 'text-gray-300'}`}>
            <div className="flex items-center"><Cpu size={14} className="mr-2 text-suse-green" />{node.cpu} vCPU</div>
            <div className="flex items-center"><MemoryStick size={14} className="mr-2 text-suse-green" />{node.ram} GB RAM</div>
            <div className="flex items-center"><HardDrive size={14} className="mr-2 text-suse-green" />{node.storage} GB Storage</div>
            {node.gpus ? <div className="flex items-center"><Layers size={14} className="mr-2 text-suse-green" />{node.gpus} GPU</div> : null}
          </div>
        </div>
      );

      /* =====================================================================
         NETWORK TAB
      ===================================================================== */
      function NetworkTab({ rules }) {
        return (
          <div className="space-y-5">
            <Panel className="p-5">
              <h2 className="text-lg font-bold text-white mb-1">Network &amp; Firewall Rules</h2>
              <p className="text-sm text-gray-400">Required connectivity based on your selected components.</p>
            </Panel>
            {rules.map(rule => (
              <Panel key={rule.name} className="p-5">
                <h3 className="font-bold text-suse-green mb-3 flex items-center"><Network size={16} className="mr-2" />{rule.name}</h3>
                <div className="overflow-x-auto">
                  <table className="min-w-full text-sm">
                    <thead>
                      <tr className="text-left text-xs uppercase tracking-wider text-gray-500 border-b border-suse-border">
                        <th className="py-2 pr-4 font-medium">Port(s)</th><th className="py-2 pr-4 font-medium">Service</th><th className="py-2 pr-4 font-medium">Source</th><th className="py-2 font-medium">Destination</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-suse-border/60">
                      {rule.ports.map((p, i) => (
                        <tr key={i}>
                          <td className="py-2.5 pr-4 font-mono text-suse-green whitespace-nowrap">{p.port}</td>
                          <td className="py-2.5 pr-4 text-gray-300">{p.service}</td>
                          <td className="py-2.5 pr-4 text-gray-400">{p.source}</td>
                          <td className="py-2.5 text-gray-400">{p.destination}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </Panel>
            ))}
          </div>
        );
      }

      /* =====================================================================
         SUMMARY TAB
      ===================================================================== */
      function SummaryTab({ summary }) {
        return (
          <div className="space-y-5">
            <Panel className="p-5">
              <h2 className="text-lg font-bold text-white mb-1">Deployment Summary</h2>
              <p className="text-sm text-gray-400">Total estimated resources for your configuration.</p>
            </Panel>
            <SummaryCard title="Total Cluster Capacity" data={summary.capacity} />
            <SummaryCard title="Services &amp; Apps Demand" data={summary.demand} />
            <SummaryCard title="Remaining Headroom / Deficit" data={summary.deltas} delta />
            {summary.serviceDetails.length > 0 && (
              <Panel className="p-5">
                <h3 className="font-bold text-white mb-3">Selected Workloads</h3>
                <div className="overflow-x-auto">
                  <table className="min-w-full text-sm">
                    <thead><tr className="text-left text-xs uppercase tracking-wider text-gray-500 border-b border-suse-border">
                      <th className="py-2 pr-4 font-medium">Workload</th><th className="py-2 pr-4 font-medium">Profile</th><th className="py-2 pr-4 font-medium">vCPU</th><th className="py-2 pr-4 font-medium">RAM</th><th className="py-2 pr-4 font-medium">Storage</th><th className="py-2 font-medium">GPU</th>
                    </tr></thead>
                    <tbody className="divide-y divide-suse-border/60">
                      {summary.serviceDetails.map((s, i) => (
                        <tr key={i}>
                          <td className="py-2.5 pr-4 text-gray-200 font-medium">{s.name}</td>
                          <td className="py-2.5 pr-4 text-gray-400">{s.profile}</td>
                          <td className="py-2.5 pr-4 font-mono text-gray-300">{s.cpu}</td>
                          <td className="py-2.5 pr-4 font-mono text-gray-300">{s.ram}</td>
                          <td className="py-2.5 pr-4 font-mono text-gray-300">{s.storage}</td>
                          <td className="py-2.5 font-mono text-gray-300">{s.gpu || 0}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </Panel>
            )}
          </div>
        );
      }

      const SummaryCard = ({ title, data, delta }) => {
        const cell = (icon, label, value) => {
          const Icon = icon;
          const ok = value >= 0;
          const color = delta ? (ok ? 'text-suse-green' : 'text-red-300') : 'text-white';
          return (
            <div className="flex items-center">
              <Icon size={22} className={`mr-3 ${delta ? (ok ? 'text-suse-green' : 'text-red-400') : 'text-suse-green'}`} />
              <div>
                <div className="text-xs text-gray-500">{label}</div>
                <div className={`text-2xl font-bold font-mono ${color}`}>{delta && value >= 0 ? `+${value}` : value}</div>
              </div>
            </div>
          );
        };
        return (
          <Panel className={`p-5 ${delta ? (data.cpu >= 0 ? 'border-suse-green/40' : 'border-red-500/40') : ''}`}>
            <h3 className="font-bold text-white mb-4">{title}</h3>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              {cell(Cpu, 'vCPUs', data.cpu)}{cell(MemoryStick, 'RAM (GB)', data.ram)}{cell(HardDrive, 'Storage (GB)', data.storage)}{cell(Layers, 'GPUs', data.gpu)}
            </div>
          </Panel>
        );
      };


      /* =====================================================================
         HOW TO + ABOUT
      ===================================================================== */
      const Step = ({ n, title, children }) => (
        <div className="flex gap-4">
          <div className="flex-shrink-0 h-8 w-8 rounded-full bg-suse-green/15 border border-suse-green/40 text-suse-green font-bold flex items-center justify-center text-sm">{n}</div>
          <div><h4 className="font-bold text-white mb-1">{title}</h4><p className="text-sm text-gray-400 leading-relaxed">{children}</p></div>
        </div>
      );

      /* =====================================================================
         VIRTUALIZATION TAB — bare-metal SUSE Virtualization (Harvester) sizing
      ===================================================================== */
      const VToggle = ({ label, checked, onChange }) => (
        <button onClick={() => onChange(!checked)}
          className={`flex items-center justify-between w-full text-left px-3 py-2 rounded-md border transition-colors ${checked ? 'bg-suse-green/10 border-suse-green/40 text-suse-green' : 'bg-suse-bg border-suse-border text-gray-300 hover:border-suse-green/40'}`}>
          <span className="text-sm">{label}</span>
          <span className={`w-9 h-5 rounded-full flex items-center px-0.5 transition-colors ${checked ? 'bg-suse-green justify-end' : 'bg-suse-border justify-start'}`}>
            <span className="w-4 h-4 rounded-full bg-white block" />
          </span>
        </button>
      );
      const VDecimal = ({ label, value, step = 0.5, min = 0.1, onChange }) => (
        <div>
          {label && <label className="block text-xs text-gray-400 mb-1">{label}</label>}
          <input type="number" step={step} min={0} value={value}
            onChange={(e) => onChange(Math.max(min, parseFloat(e.target.value) || min))}
            className="w-full bg-suse-bg border border-suse-border rounded text-center text-sm text-gray-100 py-1.5 focus:outline-none focus:border-suse-green font-mono" />
        </div>
      );
      const VTextField = ({ value, placeholder, onChange, className = "" }) => (
        <input type="text" value={value} placeholder={placeholder}
          onChange={(e) => onChange(e.target.value)}
          className={`bg-suse-bg border border-suse-border rounded text-sm text-gray-100 px-2.5 py-1.5 focus:outline-none focus:border-suse-green ${className}`} />
      );
      const VResultRow = ({ label, value, sub, tone }) => (
        <div className="flex items-center justify-between py-1.5 border-b border-suse-border/50 last:border-0">
          <span className="text-sm text-gray-400">{label}</span>
          <span className="text-right">
            <span className={`font-mono font-bold ${tone === 'bad' ? 'text-red-300' : tone === 'good' ? 'text-suse-green' : 'text-white'}`}>{value}</span>
            {sub != null && <span className="block text-[10px] text-gray-500 font-mono">{sub}</span>}
          </span>
        </div>
      );

      function HostCard({ host, mode, cap, canRemove, onUpdate, onRemove, onPrimary }) {
        return (
          <Panel className={`p-4 ${host.primary && mode === 'auto' ? 'border-suse-green/50' : ''}`}>
            <div className="flex items-center gap-2 mb-3">
              <Server size={16} className="text-suse-green flex-shrink-0" />
              <VTextField value={host.name} placeholder="Host type" onChange={v => onUpdate(host.id, 'name', v)} className="flex-1 font-medium" />
              {mode === 'auto' && (
                <button onClick={() => onPrimary(host.id)}
                  className={`text-[11px] px-2 py-1 rounded border whitespace-nowrap ${host.primary ? 'bg-suse-green/15 border-suse-green/50 text-suse-green' : 'border-suse-border text-gray-400 hover:text-suse-green'}`}>
                  {host.primary ? '● Building block' : 'Use as block'}
                </button>
              )}
              {canRemove && <button onClick={() => onRemove(host.id)} className="text-gray-500 hover:text-red-400 px-1"><Trash2 size={16} /></button>}
            </div>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
              <NumberField label="Sockets" min={1} value={host.sockets} onChange={v => onUpdate(host.id, 'sockets', v)} />
              <NumberField label="Cores / socket" min={1} value={host.coresPerSocket} onChange={v => onUpdate(host.id, 'coresPerSocket', v)} />
              <NumberField label="Threads / core" min={1} value={host.threadsPerCore} onChange={v => onUpdate(host.id, 'threadsPerCore', v)} />
              <NumberField label="RAM (GB)" min={1} value={host.ram} onChange={v => onUpdate(host.id, 'ram', v)} />
              <NumberField label="Storage (GB)" min={0} value={host.storage} onChange={v => onUpdate(host.id, 'storage', v)} />
              <NumberField label="GPUs" min={0} value={host.gpus} onChange={v => onUpdate(host.id, 'gpus', v)} />
            </div>
            <div className="grid grid-cols-2 md:grid-cols-3 gap-2 mt-2">
              {mode === 'pool' && <NumberField label="Quantity available" min={0} value={host.count} onChange={v => onUpdate(host.id, 'count', v)} />}
              <NumberField label="Reserve RAM (GB)" min={0} value={host.reserveRam} onChange={v => onUpdate(host.id, 'reserveRam', v)} />
              <NumberField label="Reserve threads" min={0} value={host.reserveThreads} onChange={v => onUpdate(host.id, 'reserveThreads', v)} />
            </div>
            {cap && (
              <div className="flex flex-wrap gap-1.5 mt-3">
                <Pill icon={Cpu} tone="green">{cap.cores} cores · {cap.threads} threads</Pill>
                <Pill icon={Cpu} tone="gray">{cap.cpu} schedulable</Pill>
                <Pill icon={MemoryStick} tone="gray">{cap.ram} GB usable</Pill>
                {cap.gpu > 0 && <Pill icon={Layers} tone="gray">{cap.gpu} GPU</Pill>}
              </div>
            )}
          </Panel>
        );
      }

      function VirtualizationTab({ virt, vs, setVirtSection, setVirtMode, addHost, updateHost, removeHost, setPrimaryHost, addVirtVm, updateVirtVm, removeVirtVm }) {
        const oc = virt.overcommit, cl = virt.cluster, st = virt.storage, dr = virt.dr;
        const capById = (id) => vs.hostCaps.find(c => c.id === id);
        const capRow = (label, dem, c, unit = '') => (
          <VResultRow label={label}
            value={`${Math.ceil(dem).toLocaleString('en-US')} / ${Math.round(c.surviving).toLocaleString('en-US')}${unit}`}
            sub={`pool total ${Math.round(c.total).toLocaleString('en-US')}${unit}`}
            tone={dem <= c.surviving ? 'good' : 'bad'} />
        );
        return (
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            {/* ---------------- Inputs ---------------- */}
            <div className="lg:col-span-2 space-y-6">
              <Panel className="p-5">
                <h2 className="text-lg font-bold text-white mb-1">SUSE Virtualization (bare-metal) planning</h2>
                <p className="text-sm text-gray-400 mb-4">Size the physical SUSE Virtualization (Harvester) hosts that will run your SUSE AI cluster. Every Kubernetes node from the <strong className="text-gray-300">Cluster Sizing</strong> tab is treated as a VM; add any extra VMs below. GPU-bound VMs are pinned 1:1 (never overcommitted). See <a href={`${GITHUB_URL}/blob/main/METHODOLOGY.md`} target="_blank" rel="noopener noreferrer" className="text-suse-green underline">METHODOLOGY.md</a> for the formulas and references.</p>
                <div className="inline-flex bg-suse-bg border border-suse-border rounded-lg p-1">
                  {[['auto', 'Size identical hosts'], ['pool', 'Check mixed inventory']].map(([m, label]) => (
                    <button key={m} onClick={() => setVirtMode(m)}
                      className={`px-3 py-1.5 rounded-md text-xs font-medium transition-colors ${virt.mode === m ? 'bg-suse-green text-white shadow' : 'text-gray-400 hover:text-gray-200'}`}>{label}</button>
                  ))}
                </div>
                <p className="text-xs text-gray-500 mt-2">{virt.mode === 'auto'
                  ? <>Auto mode computes how many identical hosts (the one marked <strong className="text-gray-400">building block</strong>) are needed.</>
                  : <>Pool mode checks whether your mixed inventory (each type × quantity) has enough capacity for the workload after reserving the largest hosts for failure.</>}</p>
              </Panel>

              {/* Host types */}
              <div>
                <SectionLabel icon={Server} right={
                  <button onClick={addHost} className="text-xs flex items-center text-suse-green hover:text-emerald-300"><Plus size={14} className="mr-1" />Add host type</button>
                }>Physical Host Types</SectionLabel>
                <div className="space-y-3">
                  {virt.hosts.map(host => (
                    <HostCard key={host.id} host={host} mode={virt.mode} cap={capById(host.id)} canRemove={virt.hosts.length > 1}
                      onUpdate={updateHost} onRemove={removeHost} onPrimary={setPrimaryHost} />
                  ))}
                </div>
              </div>

              {/* Overcommit */}
              <div>
                <SectionLabel icon={Sliders}>Overcommit Ratios <span className="text-gray-600 normal-case font-normal ml-1">(non-GPU VMs only)</span></SectionLabel>
                <Panel className="p-5 space-y-4">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <VDecimal label="vCPU : pCPU (hardware threads)" value={oc.vcpu} onChange={v => setVirtSection('overcommit','vcpu',v)} />
                    <VDecimal label="vRAM : pRAM" step={0.1} value={oc.ram} onChange={v => setVirtSection('overcommit','ram',v)} />
                  </div>
                  <div className="bg-sky-500/10 border border-sky-500/30 text-sky-200 rounded-lg p-3 flex items-start text-xs">
                    <Info size={16} className="mr-2 mt-0.5 flex-shrink-0" />
                    <div>Default <strong>1.0×</strong> on threads counts each hardware thread as one schedulable vCPU — matching the reference design's "2×24 cores + Hyperthreading = 96 vCPU". Raise the vCPU ratio for bursty / non-critical loads (2–4× is common). <strong>GPU VMs are always pinned 1:1</strong> regardless of these ratios, and keeping memory at ~1.0× avoids the host OOM-killing VMs.</div>
                  </div>
                </Panel>
              </div>

              {/* Cluster policy */}
              <div>
                <SectionLabel icon={ShieldCheck}>Cluster Resiliency Policy</SectionLabel>
                <Panel className="p-5 space-y-4">
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <NumberField label="Max VMs / host" min={1} value={cl.maxVmsPerNode} onChange={v => setVirtSection('cluster','maxVmsPerNode',v)} />
                    <NumberField label="Fault tolerance (N+x)" min={0} value={cl.faultTolerance} onChange={v => setVirtSection('cluster','faultTolerance',v)} />
                    <NumberField label="Storage replication" min={1} value={cl.replication} onChange={v => setVirtSection('cluster','replication',v)} />
                    {virt.mode === 'auto' && <NumberField label="Decided hosts (0=auto)" min={0} value={cl.decidedNodes} onChange={v => setVirtSection('cluster','decidedNodes',v)} />}
                  </div>
                  <p className="text-xs text-gray-500">Fault tolerance reserves spare hosts so the cluster survives node failures and rolling upgrades. Storage replication multiplies raw local storage (ignored when an external array is used).{virt.mode === 'auto' && <> Set <strong>Decided hosts</strong> to override the auto-computed count.</>}</p>
                </Panel>
              </div>

              {/* External storage */}
              <div>
                <SectionLabel icon={HardDrive}>External Storage</SectionLabel>
                <Panel className="p-5 space-y-4">
                  <VToggle label="Use an external storage array instead of host-local storage" checked={st.external} onChange={v => setVirtSection('storage','external',v)} />
                  {st.external && (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                      <div>
                        <label className="block text-xs text-gray-400 mb-1">Connection type</label>
                        <select value={st.connection} onChange={e => setVirtSection('storage','connection',e.target.value)}
                          className="w-full bg-suse-bg border border-suse-border rounded text-sm text-gray-100 px-2.5 py-2 focus:outline-none focus:border-suse-green">
                          {Object.entries(STORAGE_CONN).map(([k,label]) => <option key={k} value={k}>{label}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs text-gray-400 mb-1">Capacity / array notes</label>
                        <VTextField value={st.capacityNote} placeholder="e.g. 2× 100 TB all-flash, dual-controller" onChange={v => setVirtSection('storage','capacityNote',v)} className="w-full" />
                      </div>
                    </div>
                  )}
                  <div className="bg-sky-500/10 border border-sky-500/30 text-sky-200 rounded-lg p-3 flex items-start text-xs">
                    <Info size={16} className="mr-2 mt-0.5 flex-shrink-0" />
                    <div>{st.external
                      ? <>With an external array, redundancy is handled by the array — host-local replication and the per-host disk constraint are removed from the calculation. Plan <strong>{vs.externalStorageNeeded.toLocaleString('en-US')} GB</strong> usable on the {STORAGE_CONN[st.connection]}{vs.sites > 1 && <> across {vs.sites} sites</>}. Remember to provision the SAN/CSI data path on every host.</>
                      : <>Host-local storage (SUSE Storage / Longhorn) is replicated <strong>{vs.repl}×</strong>, so raw demand is {vs.agg.storage.toLocaleString('en-US')} GB × {vs.repl} = {(vs.agg.storage * vs.repl).toLocaleString('en-US')} GB spread across hosts.</>}</div>
                  </div>
                </Panel>
              </div>

              {/* DR sites */}
              <div>
                <SectionLabel icon={Route}>Disaster Recovery Sites</SectionLabel>
                <Panel className="p-5 space-y-4">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-3 items-end">
                    <NumberField label="Number of sites (incl. primary)" min={1} value={dr.sites} onChange={v => setVirtSection('dr','sites',v)} />
                    <div className="md:col-span-2">
                      <label className="block text-xs text-gray-400 mb-1">DR strategy notes</label>
                      <VTextField value={dr.note} placeholder="e.g. active/passive, async replication, 15-min RPO" onChange={v => setVirtSection('dr','note',v)} className="w-full" />
                    </div>
                  </div>
                  <p className="text-xs text-gray-500">{dr.sites > 1
                    ? <>Each additional site is sized as a full symmetric copy of the primary cluster — total hardware is multiplied by {dr.sites}.</>
                    : <>Single site (no DR replica). Increase to model a multi-site / DR footprint.</>}</p>
                </Panel>
              </div>

              {/* Custom VMs */}
              <div>
                <SectionLabel icon={Edit3} right={
                  <button onClick={addVirtVm} className="text-xs flex items-center text-suse-green hover:text-emerald-300"><Plus size={14} className="mr-1" />Add VM</button>
                }>Additional Virtual Machines</SectionLabel>
                {virt.customVms.length === 0 ? (
                  <Panel className="p-6 text-center border-dashed">
                    <p className="text-sm text-gray-500 mb-3">No extra VMs. The {vs.agg.vms} Kubernetes node VM(s) from the Cluster Sizing tab are already included.</p>
                    <button onClick={addVirtVm} className="mx-auto flex items-center gap-2 px-4 py-2 rounded-lg border border-suse-green/40 text-suse-green text-sm hover:bg-suse-green/10 transition-colors"><Plus size={16}/>Add a VM (Rancher, registry, bastion…)</button>
                  </Panel>
                ) : (
                  <div className="space-y-3">
                    {virt.customVms.map(vm => (
                      <Panel key={vm.id} className="p-3">
                        <div className="flex items-center gap-2 mb-3">
                          <VTextField value={vm.name} placeholder="VM name" onChange={v => updateVirtVm(vm.id,'name',v)} className="flex-1 font-medium" />
                          <button onClick={() => removeVirtVm(vm.id)} className="text-gray-500 hover:text-red-400 px-2"><Trash2 size={16} /></button>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-2">
                          <NumberField label="Count" min={0} value={vm.count} onChange={v => updateVirtVm(vm.id,'count',v)} />
                          <NumberField label="vCPU" min={0} value={vm.cpu} onChange={v => updateVirtVm(vm.id,'cpu',v)} />
                          <NumberField label="RAM GB" min={0} value={vm.ram} onChange={v => updateVirtVm(vm.id,'ram',v)} />
                          <NumberField label="Disk GB" min={0} value={vm.storage} onChange={v => updateVirtVm(vm.id,'storage',v)} />
                          <NumberField label="GPU" min={0} value={vm.gpu} onChange={v => updateVirtVm(vm.id,'gpu',v)} />
                        </div>
                      </Panel>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* ---------------- Results sidebar ---------------- */}
            <div className="lg:col-span-1">
              <div className="lg:sticky lg:top-32 space-y-4">
                {/* Headline */}
                {vs.mode === 'auto' ? (
                  <Panel className="p-5 text-center">
                    <div className="text-xs uppercase text-gray-500 font-bold tracking-wider mb-1">Recommended Hosts {vs.sites > 1 && `/ site`}</div>
                    <div className="text-5xl font-bold text-suse-green font-mono">{vs.decided}</div>
                    <div className="text-xs text-gray-500 mt-1">
                      {vs.autoNodes ? <>auto: {vs.minNodes} for load + {vs.ft} for fault tolerance</> : <>manually set (auto would be {vs.requiredNodes})</>}
                    </div>
                    <div className="text-[11px] text-gray-600 mt-1">building block: {vs.primary.name}</div>
                    {vs.sites > 1 && <div className="mt-2 text-sm text-white font-mono">{vs.totals.totalHosts} hosts total across {vs.sites} sites</div>}
                  </Panel>
                ) : (
                  <Panel className="p-5 text-center">
                    <div className="text-xs uppercase text-gray-500 font-bold tracking-wider mb-1">Inventory Feasibility</div>
                    <div className={`text-3xl font-bold font-mono ${vs.feasible ? 'text-suse-green' : 'text-red-300'}`}>{vs.feasible ? 'Sufficient' : 'Insufficient'}</div>
                    <div className="text-xs text-gray-500 mt-1">{vs.totalHosts} host(s) defined · tolerating {vs.ft} failure(s)</div>
                    {vs.sites > 1 && <div className="mt-2 text-sm text-white font-mono">{vs.totals.totalHosts} hosts total across {vs.sites} sites</div>}
                  </Panel>
                )}

                {/* Aggregated workload */}
                <Panel className="p-5">
                  <SectionLabel icon={Boxes}>Aggregated VM Fleet</SectionLabel>
                  <VResultRow label="Total VMs" value={vs.agg.vms} />
                  <VResultRow label="Total vCPU" value={vs.agg.cpu} sub={`≈ ${Math.ceil(vs.demand.cpu).toLocaleString('en-US')} physical threads · largest VM ${vs.agg.maxCpu}`} />
                  <VResultRow label="Total RAM" value={`${vs.agg.ram.toLocaleString('en-US')} GB`} sub={`≈ ${Math.ceil(vs.demand.ram).toLocaleString('en-US')} GB physical · largest VM ${vs.agg.maxRam} GB`} />
                  <VResultRow label="Total storage" value={`${vs.agg.storage.toLocaleString('en-US')} GB`} sub={vs.ext ? 'external array' : `×${vs.repl} replicated = ${(vs.agg.storage*vs.repl).toLocaleString('en-US')} GB`} />
                  {vs.agg.gpu > 0 && <VResultRow label="Total GPUs" value={vs.agg.gpu} />}
                  {vs.agg.gpuVms > 0 && <div className="mt-2 text-[11px] text-gray-500">{vs.agg.gpuVms} GPU VM(s) pinned at 1:1 (no overcommit); overcommit applies to the other {vs.agg.vms - vs.agg.gpuVms} VM(s).</div>}
                </Panel>

                {vs.mode === 'auto' ? (
                  <>
                    {/* Binding resource */}
                    <Panel className="p-5">
                      <SectionLabel icon={Sliders}>Minimum Hosts by Resource</SectionLabel>
                      <VResultRow label="By VM density" value={vs.min.vms} />
                      <VResultRow label="By vCPU" value={vs.min.cpu} />
                      <VResultRow label="By RAM" value={vs.min.ram} />
                      <VResultRow label="By storage" value={vs.ext ? '— (external)' : vs.min.storage} />
                      {vs.agg.gpu > 0 && <VResultRow label="By GPU" value={vs.gpuInfeasible ? 'block has 0 GPUs' : vs.min.gpu} tone={vs.gpuInfeasible ? 'bad' : undefined} />}
                      <div className="mt-2 pt-2 border-t border-suse-border flex items-center justify-between">
                        <span className="text-sm text-gray-300 font-medium">Binding minimum</span>

                {/* Provisioned totals */}
                <Panel className="p-5">
                  <SectionLabel icon={Boxes}>Provisioned Hardware{vs.sites > 1 ? ` (${vs.sites} sites)` : ''}</SectionLabel>
                  <VResultRow label="Physical hosts" value={vs.totals.totalHosts} />
                  <VResultRow label="Physical cores" value={vs.totals.cores.toLocaleString('en-US')} sub={`${vs.totals.threads.toLocaleString('en-US')} threads`} />

                    : <VResultRow label="Raw local storage" value={`${vs.totals.storage.toLocaleString('en-US')} GB`} />}

                </Panel>
              </div>
            </div>
          </div>
        );
      }

      /* =====================================================================
         Helpers: persistence, download, PDF
      ===================================================================== */
      // A saved config is valid if it has the fleet shape (clusters[]) or the
      // pre-2.3 single-cluster shape (base + services), which migrateState upgrades.
      function isValidConfig(parsed) {
        return !!parsed && (Array.isArray(parsed.clusters) || (parsed.base && parsed.services));
      }

      function loadInitialState(defaultFn) {
        // URL hash takes priority (share links), then localStorage, then defaults.
        try {
          const m = location.hash.match(/cfg=([^&]+)/);
          if (m) {
            const parsed = JSON.parse(decodeURIComponent(atob(m[1])));
            if (isValidConfig(parsed)) {
              history.replaceState(null, '', location.pathname + location.search);
              return migrateState(parsed);
            }
          }
        } catch (e) {}
        try {
          const saved = localStorage.getItem('suse-ai-sizing');
          if (saved) { const parsed = JSON.parse(saved); if (isValidConfig(parsed)) return migrateState(parsed); }
        } catch (e) {}
        return defaultFn();
      }

      function triggerDownload(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = src;
          s.onload = () => resolve();
          s.onerror = () => reject(new Error('Failed to load ' + src));
          document.head.appendChild(s);
        });
      }

      // Rasterize an SVG file to a PNG data URL at a fixed pixel height.
      // html2canvas renders external SVG <img> tags unreliably (the "botched logo"),
      // so for the PDF we draw the mark ourselves onto a canvas and embed the PNG.
      async function svgToPng(url, heightPx) {
        const resp = await fetch(url);
        let svg = await resp.text();
        const vb = svg.match(/viewBox="([\d.\s-]+)"/);
        let ratio = 1;
        if (vb) {
          const p = vb[1].trim().split(/\s+/).map(Number);
          if (p[2] && p[3]) ratio = p[2] / p[3];
        }
        const h = heightPx, w = Math.round(h * ratio);
        if (!/<svg[^>]*\swidth=/.test(svg)) {
          svg = svg.replace('<svg', `<svg width="${w}" height="${h}"`);
        }
        const objUrl = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' }));
        try {
          const img = await new Promise((res, rej) => {
            const i = new Image();
            i.onload = () => res(i); i.onerror = rej; i.src = objUrl;
          });
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          return { dataUrl: canvas.toDataURL('image/png'), ratio };
        } finally {
          URL.revokeObjectURL(objUrl);
        }
      }

      let _pdfLibsPromise = null;
      function ensurePdfLibs() {
        if (_pdfLibsPromise) return _pdfLibsPromise;
        _pdfLibsPromise = (async () => {
          if (!window.jspdf) {
            await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
          }
          const hasAutoTable = window.jspdf && window.jspdf.jsPDF && window.jspdf.jsPDF.API && window.jspdf.jsPDF.API.autoTable;
          if (!hasAutoTable) {
            await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js');
          }
          if (!window.html2canvas) {
            await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
          }
        })().catch((e) => { _pdfLibsPromise = null; throw e; });
        return _pdfLibsPromise;
      }

      async function generatePdfReport(summary, networkRules, virt, virtCfg) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const margin = 15;
        const CONTENT_TOP = 26;          // first content baseline, clear of the header
        const CONTENT_BOTTOM = 16;       // gap reserved for the footer

        // Single design system: one font (Helvetica, jsPDF default), one palette.
        const GREEN = [48, 186, 120], DARK = [12, 50, 44];
        const INK = '#0C322C', MUTE = '#6b7280', RULE = '#d1d5db';
        const dateStr = new Date().toLocaleString('en-US');
        const pageW = () => doc.internal.pageSize.getWidth();
        const pageH = () => doc.internal.pageSize.getHeight();
        const fmt = (n) => Number(n).toLocaleString('en-US');
        const signed = (n) => (n >= 0 ? `+${fmt(n)}` : fmt(n));
        const roleLabel = (r) => (CLUSTER_ROLE[r] || CLUSTER_ROLE.workload).label;

        // Logo, rasterized once from SVG; reused on every page header.
        let logo = null;
        try { logo = await svgToPng('assets/suse-ai-pos-green-stacked.svg', 320); } catch (e) { /* decorative */ }

        // Shared section heading + table defaults so every page matches.
        const sectionTitle = (text, y) => {
          doc.setFont('helvetica', 'bold'); doc.setFontSize(14); doc.setTextColor(INK);
          doc.text(text, margin, y);
          return y + 6;
        };
        const table = (opts) => {
          doc.autoTable(Object.assign({
            theme: 'grid',
            headStyles: { fillColor: GREEN, textColor: 255, fontStyle: 'bold' },
            styles: { font: 'helvetica', fontSize: 8, cellPadding: 1.6 },
            margin: { left: margin, right: margin, top: CONTENT_TOP, bottom: CONTENT_BOTTOM },
          }, opts));
          return doc.lastAutoTable.finalY;
        };

        /* ---- Page 1: Fleet summary + cluster breakdown ---- */
        let y = sectionTitle('Fleet Summary', CONTENT_TOP);
        y = table({
          startY: y,
          head: [['Resource', 'Capacity', 'Demand', 'Headroom']],
          body: [
            ['vCPU',         fmt(summary.capacity.cpu),     fmt(summary.demand.cpu),     signed(summary.deltas.cpu)],
            ['RAM (GB)',     fmt(summary.capacity.ram),     fmt(summary.demand.ram),     signed(summary.deltas.ram)],
            ['Storage (GB)', fmt(summary.capacity.storage), fmt(summary.demand.storage), signed(summary.deltas.storage)],
            ['GPU',          fmt(summary.capacity.gpu),     fmt(summary.demand.gpu),     signed(summary.deltas.gpu)],
          ],
          columnStyles: { 0: { fontStyle: 'bold' } },
          didParseCell: (d) => {
            if (d.section === 'body' && d.column.index === 3) {
              d.cell.styles.textColor = String(d.cell.raw).startsWith('-') ? [200, 40, 40] : [22, 140, 90];
              d.cell.styles.fontStyle = 'bold';
            }
          },
        }) + 10;

        y = sectionTitle('Cluster Fleet', y);
        table({
          startY: y,
          head: [['Cluster', 'Role', 'CP', 'GPU wk', 'Gen wk', 'vCPU', 'RAM GB', 'Stor GB', 'GPU']],
          body: (summary.per || []).map(({ cluster, summary: cs }) => [
            cluster.name, roleLabel(cluster.role),
            cs.counts.controlPlane, cs.counts.gpuWorkerNodes, cs.counts.generalWorkerNodes,
            fmt(cs.capacity.cpu), fmt(cs.capacity.ram), fmt(cs.capacity.storage), cs.capacity.gpu,
          ]),
          foot: [['Fleet total', `${summary.clusterCount} cluster${summary.clusterCount !== 1 ? 's' : ''}`,
            summary.counts.controlPlane, summary.counts.gpuWorkerNodes, summary.counts.generalWorkerNodes,
            fmt(summary.capacity.cpu), fmt(summary.capacity.ram), fmt(summary.capacity.storage), summary.capacity.gpu]],
          footStyles: { fillColor: DARK, textColor: 255, fontStyle: 'bold' },
        });

        /* ---- Architecture diagram (the one intentionally-raster section) ---- */
        const diagramEl = document.getElementById('pdf-diagram');
        const dCanvas = await html2canvas(diagramEl, { scale: 2, backgroundColor: '#ffffff' });
        const dImg = dCanvas.toDataURL('image/png');
        const dProps = doc.getImageProperties(dImg);
        const landscape = dProps.width > dProps.height;
        doc.addPage('a4', landscape ? 'l' : 'p');
        const yTitle = sectionTitle('Proposed Architecture', CONTENT_TOP);
        const availW = pageW() - margin * 2, availH = pageH() - yTitle - CONTENT_BOTTOM;
        const ratio = dProps.width / dProps.height;
        let fw = availW, fh = fw / ratio;
        if (fh > availH) { fh = availH; fw = fh * ratio; }
        doc.addImage(dImg, 'PNG', (pageW() - fw) / 2, yTitle, fw, fh);

        /* ---- Network rules ---- */
        doc.addPage('a4', 'p');
        y = sectionTitle('Network & Firewall Rules', CONTENT_TOP);
        networkRules.forEach(rule => {
          if (y + 24 > pageH() - CONTENT_BOTTOM) { doc.addPage('a4', 'p'); y = CONTENT_TOP; }
          doc.setFont('helvetica', 'bold'); doc.setFontSize(10.5); doc.setTextColor(INK);
          doc.text(rule.name, margin, y + 3);
          y = table({
            startY: y + 5,
            head: [['Port(s)', 'Service', 'Source', 'Destination']],
            body: rule.ports.map(p => [p.port, p.service, p.source, p.destination]),
          }) + 9;
        });

        /* ---- Virtualization (bare-metal host) sizing ---- */
        if (virt && virt.agg && virt.agg.vms > 0) {
          doc.addPage('a4', 'p');
          const ext = virt.ext;
          let vy = sectionTitle('SUSE Virtualization (Bare-Metal) Sizing', CONTENT_TOP);
          doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(MUTE);
          const intro = doc.splitTextToSize(`Mode: ${virt.mode === 'pool' ? 'Mixed inventory check' : 'Auto-size identical hosts'}  ·  Overcommit (non-GPU): ${virtCfg.overcommit.vcpu}× vCPU / ${virtCfg.overcommit.ram}× RAM  ·  GPU VMs pinned 1:1`, pageW() - margin * 2);
          doc.text(intro, margin, vy); vy += intro.length * 4 + 3;

          vy = table({ startY: vy,
            head: [['Host type', 'Qty', 'Sockets×cores×thr', 'Sched. threads', 'Usable RAM', 'Storage', 'GPU']],
            body: virtCfg.hosts.map(h => { const c = virt.hostCaps.find(x => x.id === h.id) || {}; return [
              h.name + (h.primary && virt.mode === 'auto' ? ' (block)' : ''),
              virt.mode === 'pool' ? String(h.count) : '—',
              `${h.sockets}×${h.coresPerSocket}×${h.threadsPerCore} = ${c.threads}`,
              String(c.cpu), `${fmt(c.ram || 0)} GB`,
              ext ? '—' : `${fmt(h.storage || 0)} GB`, String(h.gpus),
            ]; }) }) + 6;

          vy = table({ startY: vy, styles: { font: 'helvetica', fontSize: 9, cellPadding: 1.6 },
            head: [['Aggregated VM fleet', 'Value']],
            body: [
              ['Total VMs', `${virt.agg.vms} (${virt.agg.gpuVms} GPU-pinned)`],
              ['Total vCPU', `${virt.agg.cpu} (~${Math.ceil(virt.demand.cpu)} physical threads, largest VM ${virt.agg.maxCpu})`],
              ['Total RAM', `${fmt(virt.agg.ram)} GB (~${fmt(Math.ceil(virt.demand.ram))} GB physical, largest VM ${virt.agg.maxRam} GB)`],
              ['Total storage', ext ? `${fmt(virt.externalStorageNeeded)} GB usable (external)` : `${fmt(virt.agg.storage)} GB × ${virt.repl} = ${fmt(virt.agg.storage*virt.repl)} GB`],
              ['Total GPUs', String(virt.agg.gpu)],
            ] }) + 6;

          const resultBody = virt.mode === 'pool'
            ? [
                ['Inventory feasibility', virt.feasible ? 'SUFFICIENT' : 'INSUFFICIENT'],
                ['Hosts defined / site', String(virt.totalHosts)],
                ['Fault tolerance', `reserve ${virt.ft} largest host(s)`],
                ['Surviving vCPU (threads)', `demand ${Math.ceil(virt.demand.cpu)} / ${Math.round(virt.cap.cpu.surviving)} avail`],
                ['Surviving RAM (GB)', `demand ${Math.ceil(virt.demand.ram)} / ${Math.round(virt.cap.ram.surviving)} avail`],
                ['DR sites', String(virt.sites)],
                ['Total physical hosts', String(virt.totals.totalHosts)],
                ['Total cores / threads', `${fmt(virt.totals.cores)} / ${fmt(virt.totals.threads)}`],
                ['Total RAM', `${fmt(virt.totals.ram)} GB`],
                ['Total GPUs', String(virt.totals.gpus)],
              ]
            : [
                ['Minimum hosts (load)', String(virt.minNodes)],
                ['Fault tolerance', `+ ${virt.ft}`],
                ['Recommended hosts / site', `${virt.decided}${virt.autoNodes ? ' (auto)' : ' (manual)'}`],
                ['DR sites', String(virt.sites)],
                ['Total physical hosts', String(virt.totals.totalHosts)],
                ['Total cores / threads', `${fmt(virt.totals.cores)} / ${fmt(virt.totals.threads)}`],
                ['Total RAM', `${fmt(virt.totals.ram)} GB`],
                [ext ? 'External usable storage' : 'Total raw local storage', `${fmt(ext ? virt.externalStorageNeeded : virt.totals.storage)} GB`],
                ['Total GPUs', String(virt.totals.gpus)],
              ];
          vy = table({ startY: vy, styles: { font: 'helvetica', fontSize: 9, cellPadding: 1.6 },
            headStyles: { fillColor: DARK, textColor: 255, fontStyle: 'bold' },
            head: [['Host sizing result', 'Value']], body: resultBody }) + 6;

          vy = table({ startY: vy, theme: 'plain', styles: { font: 'helvetica', fontSize: 9, cellPadding: 1.6 },
            head: [['Design rule checks', '']], headStyles: { fillColor: GREEN, textColor: 255, fontStyle: 'bold' },
            body: virt.checks.map(c => [c.ok ? 'PASS' : 'FAIL', c.label]),
            didParseCell: (d) => { if (d.section === 'body' && d.column.index === 0) { d.cell.styles.textColor = d.cell.raw === 'PASS' ? [22,140,90] : [200,40,40]; d.cell.styles.fontStyle = 'bold'; } } }) + 6;

          if (virtCfg.dr.note) {
            doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(MUTE);
            const dl = doc.splitTextToSize(`DR strategy: ${virtCfg.dr.note}`, pageW() - margin * 2);
            doc.text(dl, margin, vy); vy += dl.length * 4 + 2;
          }
          y = vy; // continue the disclaimer flow on this page
        }

        /* ---- Disclaimer ---- */
        const disclaimer = "Disclaimer: This report was generated by an unofficial, community-built planning " +
          "tool and does not constitute official SUSE information, guidance, or a commitment. All figures are " +
          "rough estimates intended for early planning purposes only and may not reflect current product " +
          "requirements. Before making any sizing, purchasing, or deployment decision, consult the official " +
          "SUSE documentation and a qualified SUSE professional.";
        doc.setFont('helvetica', 'normal'); doc.setFontSize(8);
        const lines = doc.splitTextToSize(disclaimer, pageW() - margin * 2);
        const blockH = lines.length * 3.6 + 8;
        if (y + blockH > pageH() - CONTENT_BOTTOM) { doc.addPage('a4', 'p'); y = CONTENT_TOP; }
        doc.setDrawColor(RULE); doc.setLineWidth(0.2);
        doc.line(margin, y, pageW() - margin, y); y += 5;
        doc.setTextColor(MUTE); doc.setFontSize(8);
        doc.text(lines, margin, y);

        /* ---- Stamp a consistent header + footer on every page ---- */
        const total = doc.internal.getNumberOfPages();
        for (let i = 1; i <= total; i++) {
          doc.setPage(i);
          const W = pageW(), H = pageH();
          // Header
          if (logo) { const lw = 8 * logo.ratio; doc.addImage(logo.dataUrl, 'PNG', margin, 7, lw, 8); }
          doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.setTextColor(INK);
          doc.text('SUSE AI Sizing Report', margin + (logo ? 8 * logo.ratio + 4 : 0), 13);
          doc.setDrawColor(GREEN[0], GREEN[1], GREEN[2]); doc.setLineWidth(0.5);
          doc.line(margin, 20, W - margin, 20);
          // Footer
          doc.setDrawColor(RULE); doc.setLineWidth(0.2);
          doc.line(margin, H - 12, W - margin, H - 12);
          doc.setFont('helvetica', 'normal'); doc.setFontSize(7.5); doc.setTextColor(MUTE);
          doc.text(`Generated ${dateStr}`, margin, H - 7);
          doc.text('Planning estimate — not an official SUSE product', W / 2, H - 7, { align: 'center' });
          doc.text(`Page ${i} of ${total}`, W - margin, H - 7, { align: 'right' });
        }

        doc.save('SUSE_AI_Sizing_Report.pdf');
      }

      try {
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
      } catch (err) {
        document.getElementById('root').innerHTML =
          '<pre style="max-width:760px;margin:40px auto;padding:20px;border:1px solid #1A453C;border-radius:12px;background:#092621;color:#fca5a5;font-family:monospace;font-size:13px;white-space:pre-wrap">' +
          (err && err.stack ? err.stack : err) + '</pre>';
      }
    </script>
  </body>
</html>
