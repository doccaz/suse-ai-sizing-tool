      const CAT_ICONS = {
        'Database': Database, 'Messaging': MessageSq, 'AI / ML': Brain,

      const TABS = [
        { id: 'sizing',  label: 'Cluster Sizing',   icon: Sliders },
        { id: 'virt',    label: 'Virtualization',   icon: Boxes },

      const uid = () => Math.random().toString(36).slice(2, 9);
      const blankSummary = () => ({ cpu: 0, ram: 0, storage: 0, gpu: 0 });

      /* Capacity vs. demand for a single cluster (its effective nodes vs. its
         selected services + custom apps). Used per-cluster and summed for the fleet. */
      const computeSummary = (cluster) => {
        const capacity = blankSummary();
        const demand = blankSummary();
        baseOrder.forEach(key => {
          effNodes(cluster.base[key]).forEach(n => {
            capacity.cpu += n.cpu; capacity.ram += n.ram; capacity.storage += n.storage; capacity.gpu += (n.gpus || 0);
          });
        });
        const serviceDetails = [];
        Object.entries(cluster.services).forEach(([id, cfg]) => {
          if (!cfg.selected) return;
          const p = servicesData[id].profiles[cfg.profile];
          demand.cpu += p.cpu; demand.ram += p.ram; demand.storage += p.storage; demand.gpu += (p.gpu || 0);
          serviceDetails.push({ ...p, name: servicesData[id].name, profile: p.name });
        });
        (cluster.customApps || []).forEach(a => {
          demand.cpu += a.cpu; demand.ram += a.ram; demand.storage += a.storage; demand.gpu += (a.gpu || 0);
          serviceDetails.push({ name: a.name, profile: 'Custom', cpu: a.cpu, ram: a.ram, storage: a.storage, gpu: a.gpu });
        });
        const deltas = { cpu: capacity.cpu - demand.cpu, ram: capacity.ram - demand.ram, storage: capacity.storage - demand.storage, gpu: capacity.gpu - demand.gpu };
        const counts = { controlPlane: effNodes(cluster.base.controlPlane).length, gpuWorkerNodes: effNodes(cluster.base.gpuWorkerNodes).length, generalWorkerNodes: effNodes(cluster.base.generalWorkerNodes).length };
        return { capacity, demand, deltas, serviceDetails, counts };
      };

      /* Default config for the Virtualization (SUSE Virtualization / Harvester) tab.
         Host defaults mirror a typical 2-socket bare-metal node; the spreadsheet's
         reference host was "2 * 24 cores + Hyperthreading = 96 vCPU, 8 * 64 = 512 GB". */
      const defaultHostType = (i = 1) => ({
        id: uid(), name: `Host Type ${i}`, count: 1, primary: i === 1,
        sockets: 2, coresPerSocket: 24, threadsPerCore: 2, ram: 512, storage: 7680, gpus: 1,
        reserveRam: 0, reserveThreads: 0,            // hypervisor / OS reservation (best practice, default 0 = spreadsheet parity)
      });
      const defaultVirt = () => ({
        mode: 'auto',                               // 'auto' = size N identical hosts; 'pool' = check a mixed inventory
        hosts: [ defaultHostType(1) ],
        overcommit: { vcpu: 1, ram: 1 },            // vCPU/RAM overcommit applied to NON-GPU VMs only; GPU VMs stay 1:1
        cluster: { maxVmsPerNode: 40, faultTolerance: 2, replication: 3, decidedNodes: 0 }, // decidedNodes 0 = auto
        storage: { external: false, connection: 'iscsi', capacityNote: '' },
        dr: { sites: 1, note: '' },
        customVms: [],                              // { id, name, count, cpu, ram, storage, gpu }
      });

      const STORAGE_CONN = {
        fc:    'Fibre Channel SAN',
        iscsi: 'iSCSI SAN',
        das:   'Direct-attached LUNs / DAS',
        csi:   'External CSI driver',
        nfs:   'NFS / file share',
      };

      // Fill in any top-level keys missing from older saved/imported configs.
      const migrateState = (s) => {
        if (!s || typeof s !== 'object') return s;
        const d = defaultVirt();
        const cur = s.virtualization || {};
        const tpl = defaultHostType(1);
        let hosts = Array.isArray(cur.hosts) ? cur.hosts : null;
        if (!hosts) {
          // pre-2.1 single-host shape → wrap into a one-element host-type list
          hosts = cur.host ? [{ ...tpl, ...cur.host, id: uid(), name: 'Host Type 1', count: 1, primary: true }] : d.hosts;
        }
        hosts = hosts.map((h, i) => ({ ...tpl, ...h, id: h.id || uid(), name: h.name || `Host Type ${i + 1}`, primary: !!h.primary }));
        if (!hosts.some(h => h.primary)) hosts[0].primary = true;
        s.virtualization = {
          mode: cur.mode === 'pool' ? 'pool' : 'auto',
          hosts,
          overcommit: { ...d.overcommit, ...cur.overcommit },
          cluster: { ...d.cluster, ...cur.cluster },
          storage: { ...d.storage, ...cur.storage },
          dr: { ...d.dr, ...cur.dr },
          customVms: Array.isArray(cur.customVms) ? cur.customVms : [],
        };
        // Node profiles (added v2.2): seed defaults; ensure the management profile exists.
        if (!Array.isArray(s.nodeProfiles) || !s.nodeProfiles.length) s.nodeProfiles = defaultProfiles();
        if (!s.nodeProfiles.some(p => p.id === 'p_mgmt')) s.nodeProfiles.push({ id: 'p_mgmt', name: 'Management (4c / 16g)', cpu: 4, ram: 16, storage: 100, gpus: 0 });

        // Ensure each base group has enabled / faultTolerance / profileId fields.
        const fixGroups = (base) => {
          if (!base || typeof base !== 'object') return;
          baseOrder.forEach(key => {
            const g = base[key];
            if (!g || typeof g !== 'object') return;
            if (g.enabled === undefined) g.enabled = true;
            if (g.faultTolerance === undefined) g.faultTolerance = 0;
            if (g.profileId === undefined) g.profileId = baseComponentData[key].defaultProfileId;
          });
        };

        // Fleet model (added v2.3): wrap a pre-2.3 single cluster (top-level base/
        // services/customApps) into a clusters[] array and add a management cluster.
        if (!Array.isArray(s.clusters)) {
          const workload = {
            id: uid(), name: 'SUSE AI #1', role: 'workload', enabled: true,
            base: (s.base && typeof s.base === 'object') ? s.base : makeWorkloadCluster(s.nodeProfiles).base,
            services: s.services || defaultServices(),
            customApps: Array.isArray(s.customApps) ? s.customApps : [],
          };
          s.clusters = [ makeManagementCluster(s.nodeProfiles), workload ];
          s.selectedClusterId = workload.id;
        }
        delete s.base; delete s.services; delete s.customApps;

        s.clusters = s.clusters.map(c => ({
          enabled: true, role: 'workload', customApps: [], ...c,
          id: c.id || uid(),
          services: c.services || defaultServices(),
        }));
        s.clusters.forEach(c => fixGroups(c.base));
        if (!s.clusters.some(c => c.id === s.selectedClusterId)) s.selectedClusterId = s.clusters[s.clusters.length - 1].id;
        return s;
      };

      /* ---------------- Small UI primitives ---------------- */
      const Panel = ({ children, className = "" }) => (
        <div className={`bg-suse-panel border border-suse-border rounded-xl ${className}`}>{children}</div>
      );

      const SectionLabel = ({ icon: Icon, children, right }) => (
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-sm uppercase text-gray-500 font-bold tracking-wider flex items-center">

          </h3>
          {right}
        </div>
      );

      const NumberField = ({ label, value, min = 0, onChange }) => (
        <div>
          {label && <label className="block text-xs text-gray-400 mb-1">{label}</label>}
          <div className="flex items-center bg-suse-bg border border-suse-border rounded overflow-hidden focus-within:border-suse-green transition-colors">
            <button onClick={() => onChange(Math.max(min, (parseInt(value,10)||0) - 1))} className="px-2 py-1.5 text-gray-400 hover:text-suse-green hover:bg-suse-border/40">–</button>
            <input type="number" min={min} value={value}
              onChange={(e) => onChange(Math.max(min, parseInt(e.target.value, 10) || 0))}
              className="w-full bg-transparent text-center text-sm text-gray-100 py-1.5 focus:outline-none font-mono" />
            <button onClick={() => onChange((parseInt(value,10)||0) + 1)} className="px-2 py-1.5 text-gray-400 hover:text-suse-green hover:bg-suse-border/40">+</button>
          </div>
        </div>
      );

      const Pill = ({ icon: Icon, children, tone = "gray" }) => {
        const tones = {
          gray: "bg-suse-bg text-gray-300 border-suse-border",
          green: "bg-suse-green/10 text-suse-green border-suse-green/40",
          amber: "bg-amber-500/10 text-amber-300 border-amber-500/40",
          red: "bg-red-500/10 text-red-300 border-red-500/40",
        };
        return <span className={`inline-flex items-center gap-1.5 text-xs font-mono px-2.5 py-1 rounded-md border ${tones[tone]}`}>{Icon && <Icon size={13}/>}{children}</span>;
      };

      /* =====================================================================
         APP
      ===================================================================== */
      function App() {
        const [activeTab, setActiveTab] = useState('sizing');
        const [toast, setToast] = useState(null);
        const [busy, setBusy] = useState(false);
        const [catalogOpen, setCatalogOpen] = useState(false);
        const fileInputRef = useRef(null);

        const defaultState = () => {
          const profs = defaultProfiles();
          const workload = makeWorkloadCluster(profs);
          return ({
            nodeProfiles: profs,
            clusters: [ makeManagementCluster(profs), workload ],
            selectedClusterId: workload.id,
            virtualization: defaultVirt(),
          });
        };

        const [state, setState] = useState(() => loadInitialState(defaultState));

        // Persist to localStorage on every change.
        useEffect(() => {
          try { localStorage.setItem('suse-ai-sizing', JSON.stringify(state)); } catch (e) {}
        }, [state]);

        const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };

        /* ---- selected cluster ---- */
        const cluster = state.clusters.find(c => c.id === state.selectedClusterId) || state.clusters[0];

        // Apply an updater to whichever cluster is currently selected.
        const setSelCluster = (updater) =>
          setState(s => ({ ...s, clusters: s.clusters.map(c => c.id === s.selectedClusterId ? updater(c, s) : c) }));

        /* ---- cluster fleet management ---- */
        const selectCluster = (id) => setState(s => ({ ...s, selectedClusterId: id }));
        const toggleCluster = (id, v) => setState(s => ({ ...s, clusters: s.clusters.map(c => c.id === id ? { ...c, enabled: v } : c) }));
        const renameCluster = (id, name) => setState(s => ({ ...s, clusters: s.clusters.map(c => c.id === id ? { ...c, name } : c) }));
        const addCluster = () => setState(s => {
          const n = s.clusters.filter(c => c.role === 'workload').length + 1;
          const wc = makeWorkloadCluster(s.nodeProfiles, `SUSE AI #${n}`);
          return { ...s, clusters: [...s.clusters, wc], selectedClusterId: wc.id };
        });
        const removeCluster = (id) => setState(s => {
          const target = s.clusters.find(c => c.id === id);
          // Only downstream clusters are removable, and never the last one; special
          // clusters (management/observability) are toggled off instead.
          if (!target || target.role !== 'workload' || s.clusters.filter(c => c.role === 'workload').length <= 1) return s;
          const clusters = s.clusters.filter(c => c.id !== id);
          const selectedClusterId = s.selectedClusterId === id ? clusters[clusters.length - 1].id : s.selectedClusterId;
          return { ...s, clusters, selectedClusterId };
        });

        /* ---- dedicated Observability cluster (suggested when the service is added) ---- */
        // Move Observability into its own cluster: create it from the profile currently
        // selected on a workload cluster, then deselect the service on all workloads.
        const createObsCluster = () => setState(s => {
          if (s.clusters.some(c => c.role === 'observability')) return s;
          const src = s.clusters.find(c => c.role === 'workload' && c.services.observability && c.services.observability.selected);
          const obsProfile = src ? src.services.observability.profile : '20_ha';
          const obs = makeObservabilityCluster(s.nodeProfiles, obsProfile);
          const clusters = s.clusters.map(c => c.role === 'workload'
            ? { ...c, services: { ...c.services, observability: { ...c.services.observability, selected: false } } }
            : c);
          return { ...s, clusters: [...clusters, obs], selectedClusterId: obs.id };
        });
        // Fold Observability back: remove the dedicated cluster and re-enable the service
        // on the first workload cluster at the same profile.
        const removeObsCluster = () => setState(s => {
          const obs = s.clusters.find(c => c.role === 'observability');
          if (!obs) return s;
          const profile = (obs.services.observability && obs.services.observability.profile) || '20_ha';
          let restored = false;
          const clusters = s.clusters.filter(c => c.id !== obs.id).map(c => {
            if (!restored && c.role === 'workload') { restored = true; return { ...c, services: { ...c.services, observability: { selected: true, profile } } }; }
            return c;
          });
          const selectedClusterId = s.selectedClusterId === obs.id ? clusters[clusters.length - 1].id : s.selectedClusterId;
          return { ...s, clusters, selectedClusterId };
        });

        /* ---- base node mutations (operate on the selected cluster) ---- */
        const setGroup = (key, updater) =>
          setSelCluster(c => ({ ...c, base: { ...c.base, [key]: updater(c.base[key]) } }));

        const toggleCustom = (key, v) => setGroup(key, g => ({ ...g, custom: v }));
        const setGroupEnabled = (key, v) => setGroup(key, g => ({ ...g, enabled: v }));
        const setFaultTolerance = (key, v) => setGroup(key, g => ({ ...g, faultTolerance: Math.max(0, parseInt(v, 10) || 0) }));

        // The seed config for a group's new nodes: its assigned profile if any, else
        // the last existing node, else the static defaultConfig fallback.
        const seedConfig = (s, key, g) => {
          const p = (s.nodeProfiles || []).find(pr => pr.id === g.profileId);
          if (p) return { cpu: p.cpu, ram: p.ram, storage: p.storage, gpus: p.gpus || 0 };
          return g.nodes[g.nodes.length - 1] || baseComponentData[key].defaultConfig;
        };

        const setCount = (key, count) => setSelCluster((c, s) => {
          const g = c.base[key];
          const nodes = [...g.nodes];
          const seed = seedConfig(s, key, g);
          if (count > nodes.length) for (let i = nodes.length; i < count; i++) nodes.push({ id: uid(), cpu: seed.cpu, ram: seed.ram, storage: seed.storage, gpus: seed.gpus || 0 });
          else nodes.length = Math.max(1, count);
          return { ...c, base: { ...c.base, [key]: { ...g, nodes } } };
        });

        // Assign a reusable profile to a group (uniform mode) and rewrite every node
        // in the group to that profile's spec, preserving the node count.
        const setGroupProfile = (key, profileId) => setSelCluster((c, s) => {
          const p = (s.nodeProfiles || []).find(pr => pr.id === profileId);
          const g = c.base[key];
          const nodes = p ? g.nodes.map(n => ({ ...n, cpu: p.cpu, ram: p.ram, storage: p.storage, gpus: p.gpus || 0 })) : g.nodes;
          return { ...c, base: { ...c.base, [key]: { ...g, profileId, nodes } } };
        });

        const addNode = (key) => setSelCluster((c, s) => {
          const g = c.base[key];
          const seed = seedConfig(s, key, g);
          return { ...c, base: { ...c.base, [key]: { ...g, nodes: [...g.nodes, { id: uid(), cpu: seed.cpu, ram: seed.ram, storage: seed.storage, gpus: seed.gpus || 0 }] } } };
        });
        const removeNode = (key, id) => setGroup(key, g => ({ ...g, nodes: g.nodes.length > 1 ? g.nodes.filter(n => n.id !== id) : g.nodes }));
        const updateNode = (key, id, field, value) => setGroup(key, g => ({ ...g, nodes: g.nodes.map(n => n.id === id ? { ...n, [field]: Math.max(0, parseInt(value, 10) || 0) } : n) }));

        /* ---- reusable node profiles (shared across the whole fleet) ---- */
        const addProfile = () => setState(s => {
          const id = uid();
          return { ...s, nodeProfiles: [...(s.nodeProfiles || []), { id, name: 'New profile', cpu: 4, ram: 8, storage: 100, gpus: 0 }] };
        });
        // Rewrite every uniform-mode group (in every cluster) that uses this profile.
        const applyProfileToClusters = (clusters, p) => clusters.map(c => ({
          ...c, base: Object.fromEntries(baseOrder.map(key => {
            const g = c.base[key];
            return [key, (g && !g.custom && g.profileId === p.id)
              ? { ...g, nodes: g.nodes.map(n => ({ ...n, cpu: p.cpu, ram: p.ram, storage: p.storage, gpus: p.gpus || 0 })) }
              : g];
          })),
        }));
        const updateProfile = (id, field, value) => setState(s => {
          const v = field === 'name' ? value : Math.max(0, parseInt(value, 10) || 0);
          const nodeProfiles = (s.nodeProfiles || []).map(p => p.id === id ? { ...p, [field]: v } : p);
          const p = nodeProfiles.find(pr => pr.id === id);
          const clusters = (field !== 'name' && p) ? applyProfileToClusters(s.clusters, p) : s.clusters;
          return { ...s, nodeProfiles, clusters };
        });
        const removeProfile = (id) => setState(s => {
          const remaining = (s.nodeProfiles || []).filter(p => p.id !== id);
          if (!remaining.length) return s; // never delete the last profile
          const fallback = remaining[0].id;
          const clusters = s.clusters.map(c => ({
            ...c, base: Object.fromEntries(baseOrder.map(key => {
              const g = c.base[key];
              return [key, (g && g.profileId === id) ? { ...g, profileId: fallback } : g];
            })),
          }));
          return { ...s, nodeProfiles: remaining, clusters };
        });

        /* ---- services / custom apps (operate on the selected cluster) ---- */
        const setService = (id, field, value) => setSelCluster(c => ({ ...c, services: { ...c.services, [id]: { ...c.services[id], [field]: value } } }));
        const addCustomApp = () => setSelCluster(c => ({ ...c, customApps: [...c.customApps, { id: uid(), name: 'Custom App', cpu: 2, ram: 4, storage: 20, gpu: 0 }] }));
        const updateCustomApp = (id, field, value) => setSelCluster(c => ({ ...c, customApps: c.customApps.map(a => a.id === id ? { ...a, [field]: field === 'name' ? value : Math.max(0, parseInt(value, 10) || 0) } : a) }));
        const removeCustomApp = (id) => setSelCluster(c => ({ ...c, customApps: c.customApps.filter(a => a.id !== id) }));

        /* ---- virtualization tab ---- */
        const setVirtSection = (section, field, value) =>
          setState(s => ({ ...s, virtualization: { ...s.virtualization, [section]: { ...s.virtualization[section], [field]: value } } }));
        const setVirtMode = (mode) => setState(s => ({ ...s, virtualization: { ...s.virtualization, mode } }));
        const addHost = () => setState(s => { const v = s.virtualization; return { ...s, virtualization: { ...v, hosts: [...v.hosts, defaultHostType(v.hosts.length + 1)] } }; });
        const updateHost = (id, field, value) => setState(s => ({ ...s, virtualization: { ...s.virtualization, hosts: s.virtualization.hosts.map(h => h.id === id ? { ...h, [field]: field === 'name' ? value : Math.max(0, parseInt(value, 10) || 0) } : h) } }));
        const removeHost = (id) => setState(s => { const v = s.virtualization; if (v.hosts.length <= 1) return s; let hosts = v.hosts.filter(h => h.id !== id); if (!hosts.some(h => h.primary)) hosts = hosts.map((h, i) => i === 0 ? { ...h, primary: true } : h); return { ...s, virtualization: { ...v, hosts } }; });
        const setPrimaryHost = (id) => setState(s => ({ ...s, virtualization: { ...s.virtualization, hosts: s.virtualization.hosts.map(h => ({ ...h, primary: h.id === id })) } }));
        const addVirtVm = () => setState(s => ({ ...s, virtualization: { ...s.virtualization, customVms: [...s.virtualization.customVms, { id: uid(), name: 'Custom VM', count: 1, cpu: 4, ram: 8, storage: 100, gpu: 0 }] } }));
        const updateVirtVm = (id, field, value) => setState(s => ({ ...s, virtualization: { ...s.virtualization, customVms: s.virtualization.customVms.map(v => v.id === id ? { ...v, [field]: field === 'name' ? value : Math.max(0, parseInt(value, 10) || 0) } : v) } }));
        const removeVirtVm = (id) => setState(s => ({ ...s, virtualization: { ...s.virtualization, customVms: s.virtualization.customVms.filter(v => v.id !== id) } }));

        /* ---- derived summaries ---- */
        // Selected cluster (drives the Sizing-tab editor + its sidebar totals).
        const summary = useMemo(() => computeSummary(cluster), [cluster]);

        // Fleet rollup across every enabled cluster (drives the Summary/Diagram tabs,
        // the PDF report and the "Fleet total" card in the sidebar).
        const fleet = useMemo(() => {
          const capacity = blankSummary();
          const demand = blankSummary();
          const serviceDetails = [];
          const per = state.clusters.filter(c => c.enabled).map(c => ({ cluster: c, summary: computeSummary(c) }));
          per.forEach(({ summary: cs }) => {
            ['cpu','ram','storage','gpu'].forEach(k => { capacity[k] += cs.capacity[k]; demand[k] += cs.demand[k]; });
            serviceDetails.push(...cs.serviceDetails);
          });
          const deltas = { cpu: capacity.cpu - demand.cpu, ram: capacity.ram - demand.ram, storage: capacity.storage - demand.storage, gpu: capacity.gpu - demand.gpu };
          const counts = {
            controlPlane: per.reduce((a, p) => a + p.summary.counts.controlPlane, 0),
            gpuWorkerNodes: per.reduce((a, p) => a + p.summary.counts.gpuWorkerNodes, 0),
            generalWorkerNodes: per.reduce((a, p) => a + p.summary.counts.generalWorkerNodes, 0),
          };
          return { capacity, demand, deltas, serviceDetails, counts, per, clusterCount: per.length };
        }, [state.clusters]);

        /* ---- virtualization / hypervisor sizing ----
           Each Kubernetes node defined in the Cluster Sizing tab is treated as one VM
           placed on the bare-metal SUSE Virtualization (Harvester) hosts, plus any
           custom VMs added here. Builds on the "Harvester" sheet of the reference
           spreadsheet, with two refinements vs. the hand calculation:
             1. GPU VMs are never CPU/RAM-overcommitted (they pin physical resources);
                overcommit applies only to non-GPU VMs. All demand is therefore
                normalised to *physical* threads / GB.
             2. Hosts are a list of types. "auto" mode sizes N identical primary hosts;
                "pool" mode capacity-checks a mixed inventory, reserving the FT largest
                hosts for failure. See METHODOLOGY.md for formulas and references. */
        const virtSummary = useMemo(() => {
          const v = state.virtualization;
          const vcpuRatio = Math.max(0.1, v.overcommit.vcpu || 1);
          const ramRatio = Math.max(0.1, v.overcommit.ram || 1);
          const ext = v.storage.external;
          const repl = Math.max(1, v.cluster.replication);
          const ft = Math.max(0, v.cluster.faultTolerance);
          const sites = Math.max(1, v.dr.sites);
          const maxVmsPerNode = Math.max(1, v.cluster.maxVmsPerNode);
          const ceil = (a, b) => (b > 0 ? Math.ceil(a / b) : 0);

          // Build the VM fleet: every k8s node across every enabled cluster is a VM,
          // plus custom VMs (expanded by count).
          const vms = [];
          const groupLabels = { controlPlane: 'Control Plane', gpuWorkerNodes: 'GPU Worker', generalWorkerNodes: 'General Worker' };
          state.clusters.filter(c => c.enabled).forEach(c => baseOrder.forEach(key => effNodes(c.base[key]).forEach((n, i) =>
            vms.push({ name: `${c.name} · ${groupLabels[key]} ${i + 1}`, cpu: n.cpu, ram: n.ram, storage: n.storage, gpu: n.gpus || 0 }))));
          v.customVms.forEach(cv => {
            const count = Math.max(0, cv.count || 0);
            for (let i = 0; i < count; i++) vms.push({ name: count > 1 ? `${cv.name} ${i + 1}` : cv.name, cpu: cv.cpu, ram: cv.ram, storage: cv.storage, gpu: cv.gpu || 0 });
          });

          // Aggregate, splitting GPU vs non-GPU so GPU VMs can be kept at 1:1.
          const agg = { vms: vms.length, cpu: 0, ram: 0, storage: 0, gpu: 0, gpuVms: 0,
                        maxCpu: 0, maxRam: 0, maxStorage: 0, maxGpu: 0,
                        gpuVcpu: 0, nonGpuVcpu: 0, gpuRam: 0, nonGpuRam: 0 };
          vms.forEach(m => {
            agg.cpu += m.cpu; agg.ram += m.ram; agg.storage += m.storage; agg.gpu += m.gpu;
            agg.maxCpu = Math.max(agg.maxCpu, m.cpu); agg.maxRam = Math.max(agg.maxRam, m.ram);
            agg.maxStorage = Math.max(agg.maxStorage, m.storage); agg.maxGpu = Math.max(agg.maxGpu, m.gpu);
            if (m.gpu > 0) { agg.gpuVms++; agg.gpuVcpu += m.cpu; agg.gpuRam += m.ram; }
            else { agg.nonGpuVcpu += m.cpu; agg.nonGpuRam += m.ram; }
          });

          // Demand normalised to PHYSICAL host units. GPU VMs 1:1; non-GPU divided by overcommit.
          const demand = {
            cpu: agg.gpuVcpu + agg.nonGpuVcpu / vcpuRatio,   // physical threads
            ram: agg.gpuRam + agg.nonGpuRam / ramRatio,      // physical GB
            storage: ext ? 0 : agg.storage * repl,
            gpu: agg.gpu,
          };
          // Largest single VM's physical footprint (the "must fit one host" rule).
          let maxVmThreads = 0, maxVmRam = 0;
          vms.forEach(m => {
            maxVmThreads = Math.max(maxVmThreads, m.gpu > 0 ? m.cpu : m.cpu / vcpuRatio);
            maxVmRam = Math.max(maxVmRam, m.gpu > 0 ? m.ram : m.ram / ramRatio);
          });

          // Per-host-type physical capacity (after hypervisor/OS reservation).
          const capOf = (h) => {
            const threads = Math.max(1, h.sockets * h.coresPerSocket * h.threadsPerCore);
            return { id: h.id, name: h.name, count: Math.max(0, h.count || 0),
                     cores: h.sockets * h.coresPerSocket, threads,
                     cpu: Math.max(0, threads - (h.reserveThreads || 0)),
                     ram: Math.max(0, h.ram - (h.reserveRam || 0)), rawRam: h.ram,
                     storage: h.storage, gpu: h.gpus };
          };
          const hostCaps = v.hosts.map(capOf);
          const primaryHost = v.hosts.find(h => h.primary) || v.hosts[0];
          const primary = hostCaps.find(h => h.id === primaryHost.id) || hostCaps[0];

          let result;
          if (v.mode === 'pool') {
            // Heterogeneous inventory: aggregate capacity; reserve the FT largest hosts (worst case) per resource.
            const units = [];
            hostCaps.forEach(h => { for (let i = 0; i < h.count; i++) units.push(h); });
            const totalHosts = units.length;
            const survSum = (sel) => {
              const vals = units.map(sel).sort((a, b) => b - a);
              const total = vals.reduce((s, x) => s + x, 0);
              const dropped = vals.slice(0, ft).reduce((s, x) => s + x, 0);
              return { total, surviving: Math.max(0, total - dropped) };
            };
            const cpu = survSum(h => h.cpu), ram = survSum(h => h.ram), storage = survSum(h => h.storage), gpu = survSum(h => h.gpu);
            const vmsCap = { total: totalHosts * maxVmsPerNode, surviving: Math.max(0, totalHosts - ft) * maxVmsPerNode };
            const checksPool = {
              cpu: demand.cpu <= cpu.surviving,
              ram: demand.ram <= ram.surviving,
              storage: ext || demand.storage <= storage.surviving,
              gpu: demand.gpu <= gpu.surviving,
              vms: agg.vms <= vmsCap.surviving,
            };
            const feasible = totalHosts > ft && Object.values(checksPool).every(Boolean);
            result = { mode: 'pool', totalHosts, cap: { cpu, ram, storage, gpu, vms: vmsCap }, checksPool, feasible };
          } else {
            // Auto: how many identical primary hosts are needed.
            const H = primary;
            const min = {
              vms: ceil(agg.vms, maxVmsPerNode),
              cpu: ceil(demand.cpu, H.cpu),
              ram: ceil(demand.ram, H.ram),
              storage: ext ? 0 : ceil(demand.storage, H.storage),
              gpu: H.gpu > 0 ? ceil(demand.gpu, H.gpu) : 0,
            };
            const gpuInfeasible = demand.gpu > 0 && H.gpu === 0;
            const minNodes = Math.max(1, min.vms, min.cpu, min.ram, min.storage, min.gpu);
            const requiredNodes = minNodes + ft;
            const decided = v.cluster.decidedNodes > 0 ? v.cluster.decidedNodes : requiredNodes;
            const failDenom = decided - ft;
            const perNode = (d) => d > 0 ? { vms: ceil(agg.vms, d), cpu: ceil(demand.cpu, d), ram: ceil(demand.ram, d), storage: ext ? 0 : ceil(demand.storage, d) } : null;
            const normal = perNode(decided), failure = perNode(failDenom);
            const util = normal ? {
              cpu: H.cpu ? Math.round(100 * normal.cpu / H.cpu) : 0,
              ram: H.ram ? Math.round(100 * normal.ram / H.ram) : 0,
              storage: (!ext && H.storage) ? Math.round(100 * normal.storage / H.storage) : 0,
            } : null;
            result = { mode: 'auto', H, min, minNodes, requiredNodes, decided, failDenom, normal, failure, util,
                       gpuInfeasible, autoNodes: v.cluster.decidedNodes === 0 };
          }

          // Largest host (for "fits one host" rule, mode-aware).
          const biggest = (sel) => hostCaps.reduce((m, h) => (v.mode === 'pool' ? h.count > 0 : h.id === primary.id) ? Math.max(m, sel(h)) : m, 0);
          const bigHost = { cpu: biggest(h => h.cpu), ram: biggest(h => h.ram), storage: biggest(h => h.storage), gpu: biggest(h => h.gpu) };
          const checks = [
            { label: `A single host can schedule the largest VM (needs ${Math.ceil(maxVmThreads)} threads)`, ok: bigHost.cpu >= maxVmThreads },
            { label: `A single host can hold the largest VM's RAM (needs ${Math.ceil(maxVmRam)} GB)`, ok: bigHost.ram >= maxVmRam },
            { label: ext ? 'Largest volume served by external storage' : `A single host can hold the largest volume (${agg.maxStorage} GB, no volume striping)`, ok: ext || bigHost.storage >= agg.maxStorage },
            { label: agg.gpu > 0 ? `A GPU host can place the largest GPU VM (${agg.maxGpu} GPU)` : 'No GPU VMs to place', ok: agg.gpu === 0 || bigHost.gpu >= agg.maxGpu },
          ];
          if (v.mode === 'pool') checks.push({ label: `Inventory still runs the full load after ${ft} host failure(s)`, ok: result.feasible });
          else checks.push({ label: `Cluster survives ${ft} simultaneous host failure(s) with a spare for upgrades`, ok: result.failDenom >= 1 && !!result.failure && result.failure.cpu <= result.H.cpu && result.failure.ram <= result.H.ram && (ext || result.failure.storage <= result.H.storage) });

          // Provisioned totals (× DR sites).
          let totals;
          if (v.mode === 'pool') {
            const sum = (sel) => hostCaps.reduce((s, h) => s + h.count * sel(h), 0);
            totals = { perSiteHosts: result.totalHosts, totalHosts: result.totalHosts * sites,
                       cores: sum(h => h.cores) * sites, threads: sum(h => h.threads) * sites,
                       ram: sum(h => h.rawRam) * sites, storage: ext ? 0 : sum(h => h.storage) * sites, gpus: sum(h => h.gpu) * sites };
          } else {
            const H = result.H, hc = v.hosts.find(x => x.id === H.id) || v.hosts[0];
            totals = { perSiteHosts: result.decided, totalHosts: result.decided * sites,
                       cores: result.decided * H.cores * sites, threads: result.decided * H.threads * sites,
                       ram: result.decided * hc.ram * sites, storage: ext ? 0 : result.decided * hc.storage * sites, gpus: result.decided * hc.gpu * sites };
          }
          const externalStorageNeeded = ext ? agg.storage * sites : 0;

          return { ...result, agg, demand, ext, repl, ft, sites, vcpuRatio, ramRatio,
                   maxVmThreads, maxVmRam, checks, totals, externalStorageNeeded, hostCaps, primary };
        }, [state]);

        const activeNetworkRules = useMemo(() => {
          const rules = [networkData.rancher, networkData.clusterInternal];
          const anySelected = (k) => state.clusters.some(c => c.enabled && c.services[k] && c.services[k].selected);
          ['suseSecurity','suseStorage','privateRegistry','observability'].forEach(k => { if (anySelected(k)) rules.push(networkData[k]); });
          return rules;
        }, [state.clusters]);

        /* ---- share / import / export ---- */
        const copyShareLink = () => {
          try {
            const encoded = btoa(encodeURIComponent(JSON.stringify(state)));
            const url = `${location.origin}${location.pathname}#cfg=${encoded}`;
            navigator.clipboard.writeText(url);
            showToast("Share link copied to clipboard");
          } catch (e) { showToast("Could not create link"); }
        };
        const downloadJson = () => {
          const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
          triggerDownload(blob, 'suse-ai-sizing-config.json');
          showToast("Configuration exported");
        };
        const importJson = (e) => {
          const file = e.target.files[0]; if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try { const parsed = JSON.parse(ev.target.result); if (isValidConfig(parsed)) { setState(migrateState(parsed)); showToast("Configuration imported"); } else showToast("Invalid config file"); }
            catch (err) { showToast("Could not parse file"); }
          };
          reader.readAsText(file); e.target.value = '';
        };
        const resetAll = () => { if (confirm("Reset to defaults? This clears your current configuration.")) { setState(defaultState()); showToast("Reset to defaults"); } };
        const exportPdf = async () => {
          setBusy(true);
          try {
            await ensurePdfLibs();
            await generatePdfReport(fleet, activeNetworkRules, virtSummary, state.virtualization);
            showToast("PDF report generated");
          } catch (e) {
            console.error(e);
            const netErr = e && /load|network/i.test(e.message || '');
            showToast(netErr ? "Couldn't load PDF libraries (check network)" : "PDF generation failed");
          } finally { setBusy(false); }
        };

        const addFromCatalog = (entry) => {
          setSelCluster(c => ({ ...c, customApps: [...c.customApps, { id: uid(), name: entry.name, cpu: entry.cpu, ram: entry.ram, storage: entry.storage, gpu: entry.gpu || 0 }] }));
          setCatalogOpen(false);
        };

        return (
          <div className="flex flex-col min-h-screen">
            {/* Header */}
            <header className="sticky top-0 z-20 bg-suse-panel border-b border-suse-border shadow-lg">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex flex-wrap items-center gap-y-3">
                <div className="flex items-center mr-auto">
                  <img src="assets/suse-ai-neg-green-stacked.svg" alt="SUSE AI" className="h-11 mr-3" />
                  <div className="border-l border-suse-border pl-3">
                    <h1 className="text-lg font-bold tracking-tight text-white leading-none">Sizing Architect</h1>
                    <p className="text-[11px] text-suse-green font-medium tracking-wide mt-0.5">Plan hardware & network for SUSE AI</p>
                  </div>
                </div>
                <nav className="flex flex-wrap bg-suse-bg rounded-lg p-1 border border-suse-border">
                  {TABS.map(t => {
                    const Icon = t.icon; const active = activeTab === t.id;
                    return (
                      <button key={t.id} onClick={() => setActiveTab(t.id)}
                        className={`px-3 py-1.5 rounded-md text-xs sm:text-sm font-medium transition-all flex items-center ${active ? 'bg-suse-green text-white shadow' : 'text-gray-400 hover:text-gray-100'}`}>
                        <Icon size={14} className="mr-1.5" />{t.label}
                      </button>
                    );
                  })}
                </nav>
              </div>
            </header>

            {/* Action bar */}
            <div className="bg-suse-panel/60 border-b border-suse-border">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 py-2 flex flex-wrap items-center gap-2">
                <ActionBtn icon={Link2} onClick={copyShareLink}>Share Link</ActionBtn>
                <ActionBtn icon={FileText} onClick={exportPdf} disabled={busy}>{busy ? 'Generating…' : 'Export PDF'}</ActionBtn>
                <ActionBtn icon={DownloadIcon} onClick={downloadJson}>Save Config</ActionBtn>
                <ActionBtn icon={FileUp} onClick={() => fileInputRef.current.click()}>Load Config</ActionBtn>
                <input type="file" accept="application/json" ref={fileInputRef} onChange={importJson} className="hidden" />
                <ActionBtn icon={RotateCcw} onClick={resetAll} tone="danger">Reset</ActionBtn>
                <div className="ml-auto hidden md:flex items-center gap-2 text-xs text-gray-500 font-mono">
                  <Pill icon={Cpu} tone="green">{summary.capacity.cpu} vCPU</Pill>
                  <Pill icon={MemoryStick} tone="green">{summary.capacity.ram} GB</Pill>
                  <Pill icon={Layers} tone="green">{summary.capacity.gpu} GPU</Pill>
                </div>
              </div>
            </div>

            {/* Main */}
            <main className="flex-1">
              <div className="max-w-7xl mx-auto p-4 sm:p-6 pb-24">
                {activeTab === 'sizing' && (
                  <SizingTab state={state} cluster={cluster} summary={summary} fleet={fleet}
                    selectCluster={selectCluster} toggleCluster={toggleCluster} renameCluster={renameCluster} addCluster={addCluster} removeCluster={removeCluster}
                    createObsCluster={createObsCluster} removeObsCluster={removeObsCluster}
                    toggleCustom={toggleCustom} setCount={setCount} addNode={addNode} removeNode={removeNode} updateNode={updateNode}
                    setGroupEnabled={setGroupEnabled} setFaultTolerance={setFaultTolerance} setGroupProfile={setGroupProfile}
                    addProfile={addProfile} updateProfile={updateProfile} removeProfile={removeProfile}
                    setService={setService} addCustomApp={addCustomApp} updateCustomApp={updateCustomApp} removeCustomApp={removeCustomApp}
                    openCatalog={() => setCatalogOpen(true)} />
                )}
                {activeTab === 'virt' && (
                  <VirtualizationTab virt={state.virtualization} vs={virtSummary}
                    setVirtSection={setVirtSection} setVirtMode={setVirtMode}
                    addHost={addHost} updateHost={updateHost} removeHost={removeHost} setPrimaryHost={setPrimaryHost}
                    addVirtVm={addVirtVm} updateVirtVm={updateVirtVm} removeVirtVm={removeVirtVm} />
                )}
                {activeTab === 'diagram' && <DiagramTab state={state} summary={fleet} virtSummary={virtSummary} />}
                {activeTab === 'network' && <NetworkTab rules={activeNetworkRules} />}
                {activeTab === 'summary' && <SummaryTab summary={fleet} />}
                {activeTab === 'howto' && <HowToTab />}
                {activeTab === 'about' && <AboutTab />}
              </div>
            </main>

            {/* Hidden render target for PDF capture — only the architecture diagram is
                rasterized; the rest of the report is drawn as vector text/tables. */}
            <div className="fixed -left-[9999px] top-0" aria-hidden="true">
              <div id="pdf-diagram" style={{ width: 1100, background: '#ffffff', padding: 24 }}><DiagramTab state={state} summary={fleet} virtSummary={virtSummary} forPdf /></div>
            </div>

            <footer className="text-center py-4 text-xs text-gray-600 border-t border-suse-border">
              For planning purposes only — always confirm against the latest official SUSE documentation before production deployment.
            </footer>

            {/* version + ribbon */}
            <div className="fixed bottom-3 left-4 text-[10px] text-gray-600 font-mono z-40">v{APP_VERSION}</div>
            <div className="fixed bottom-0 right-0 z-40 w-32 h-32 overflow-hidden pointer-events-none">
              <a href={GITHUB_URL} target="_blank" rel="noopener noreferrer"
                className="absolute block w-[200px] py-1.5 bottom-[25px] -right-[60px] -rotate-45 bg-suse-border text-white text-[10px] font-bold text-center border-y border-suse-green/40 shadow-lg hover:bg-suse-green transition-colors uppercase tracking-wider pointer-events-auto">
                Fork on GitHub
              </a>
            </div>

            {catalogOpen && <CatalogBrowser onClose={() => setCatalogOpen(false)} onAdd={addFromCatalog} />}

            {toast && (
              <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-suse-green text-white text-sm font-medium px-4 py-2 rounded-lg shadow-xl flex items-center">
                <CheckCircle size={16} className="mr-2" />{toast}
              </div>
            )}
          </div>
        );
      }

      const ActionBtn = ({ icon: Icon, children, onClick, disabled, tone }) => (
        <button onClick={onClick} disabled={disabled}
          className={`text-xs flex items-center px-3 py-1.5 rounded-md border transition-colors disabled:opacity-50 ${
            tone === 'danger'
              ? 'bg-suse-bg border-red-900/50 text-red-300 hover:bg-red-900/20 hover:border-red-700'
              : 'bg-suse-bg border-suse-border text-gray-300 hover:border-suse-green hover:text-suse-green'}`}>
          <Icon size={13} className="mr-1.5" />{children}
        </button>
      );

      /* =====================================================================
         CLUSTER SWITCHER — selects which cluster in the fleet is being edited
      ===================================================================== */
      function ClusterSwitcher({ state, cluster, fleet, selectCluster, toggleCluster, removeCluster, addCluster }) {
        const workloadCount = state.clusters.filter(c => c.role === 'workload').length;
        return (
          <Panel className="p-3">
            <div className="flex items-center gap-2 flex-wrap">
              {state.clusters.map(c => {
                const role = CLUSTER_ROLE[c.role] || CLUSTER_ROLE.workload;
                const RIcon = role.icon;
                const sel = c.id === cluster.id;
                return (
                  <div key={c.id} onClick={() => selectCluster(c.id)}
                    className={`flex items-center gap-2 rounded-lg border px-3 py-1.5 cursor-pointer transition-colors ${sel ? 'border-suse-green bg-suse-green/10' : 'border-suse-border bg-suse-bg hover:border-suse-green/50'} ${c.enabled ? '' : 'opacity-50'}`}>
                    <RIcon size={14} className={sel ? 'text-suse-green' : 'text-gray-400'} />
                    <div className="leading-tight">
                      <div className={`text-sm font-bold ${sel ? 'text-white' : 'text-gray-300'}`}>{c.name}</div>
                      <div className="text-[10px] uppercase tracking-wider text-gray-500">{role.label}</div>
                    </div>
                    <label onClick={(e) => e.stopPropagation()} className="flex items-center cursor-pointer ml-1" title={c.enabled ? 'Included in fleet' : 'Excluded from fleet'}>
                      <input type="checkbox" checked={c.enabled} onChange={(e) => toggleCluster(c.id, e.target.checked)} className="sr-only peer" />
                      <span className="w-8 h-4 bg-suse-panel border border-suse-border rounded-full relative peer-checked:bg-suse-green/30 peer-checked:border-suse-green after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:w-3 after:h-3 after:rounded-full after:bg-gray-400 peer-checked:after:bg-suse-green after:transition-all peer-checked:after:translate-x-4"></span>
                    </label>
                    {c.role === 'workload' && workloadCount > 1 && (
                      <button onClick={(e) => { e.stopPropagation(); removeCluster(c.id); }} className="text-red-400 hover:text-red-300 ml-0.5"><Trash2 size={13} /></button>
                    )}
                  </div>
                );
              })}
              <button onClick={addCluster} className="flex items-center gap-1.5 rounded-lg border border-dashed border-suse-border px-3 py-2 text-xs text-suse-green hover:border-suse-green hover:bg-suse-green/5"><Plus size={14} />Add downstream</button>
            </div>
            <div className="mt-2.5 pt-2.5 border-t border-suse-border text-[11px] text-gray-500 flex flex-wrap gap-x-4 gap-y-1">
              <span><strong className="text-gray-300">Fleet:</strong> {fleet.clusterCount} cluster{fleet.clusterCount !== 1 ? 's' : ''} enabled</span>
              <span>{fleet.capacity.cpu} vCPU</span>
              <span>{fleet.capacity.ram} GB RAM</span>
              <span>{fleet.capacity.storage} GB storage</span>
              <span>{fleet.capacity.gpu} GPU</span>
            </div>
          </Panel>
        );
      }

      /* =====================================================================
         SIZING TAB
      ===================================================================== */
      function SizingTab(props) {
        const { state, cluster, summary, fleet } = props;
        const roleMeta = CLUSTER_ROLE[cluster.role] || CLUSTER_ROLE.workload;
        const isWorkload = cluster.role === 'workload';
        const isObs = cluster.role === 'observability';
        const obsCluster = state.clusters.find(c => c.role === 'observability');
        // Recommend a dedicated cluster once Observability is selected on a workload cluster.
        const suggestObs = isWorkload && !obsCluster && cluster.services.observability && cluster.services.observability.selected;
        return (
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 space-y-6">
              <ClusterSwitcher state={state} cluster={cluster} fleet={fleet}
                selectCluster={props.selectCluster} toggleCluster={props.toggleCluster}
                removeCluster={props.removeCluster} addCluster={props.addCluster} />

              <Panel className="p-5">
                <div className="flex items-start justify-between gap-3">
                  <div className="min-w-0">
                    {isWorkload ? (
                      <input value={cluster.name} onChange={(e) => props.renameCluster(cluster.id, e.target.value)}
                        className="text-lg font-bold text-white bg-transparent border-b border-transparent hover:border-suse-border focus:border-suse-green focus:outline-none w-full" />
                    ) : (
                      <h2 className="text-lg font-bold text-white mb-1">{cluster.name}</h2>
                    )}
                    <p className="text-sm text-gray-400 mt-1">
                      {cluster.role === 'management'
                        ? 'Rancher management cluster — runs the Rancher control plane that manages your downstream clusters. Sized for HA, no AI workloads.'
                        : cluster.role === 'observability'
                        ? 'Dedicated SUSE Observability cluster — collects metrics, logs and traces for the fleet.'
                        : 'Downstream SUSE AI cluster — configure its nodes and services below. Totals update live in the sidebar.'}
                    </p>
                  </div>
                  <span className="text-[10px] uppercase tracking-wider text-gray-500 whitespace-nowrap bg-suse-bg border border-suse-border rounded px-2 py-1">{roleMeta.label}</span>
                </div>
              </Panel>

              <div>
                <SectionLabel icon={Settings} right={
                  <button onClick={props.addProfile} className="text-xs flex items-center text-suse-green hover:text-emerald-300"><Plus size={14} className="mr-1" />Add profile</button>
                }>Node Profiles</SectionLabel>
                <Panel className="p-5">
                  <p className="text-xs text-gray-400 mb-4">Reusable per-node sizes. Assign one to a node group below, then balance scale-up (fewer, larger nodes) against scale-out (more, smaller nodes). Editing a profile updates every group that uses it.</p>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    {(state.nodeProfiles || []).map(p => (
                      <div key={p.id} className="bg-suse-bg border border-suse-border rounded-md p-3">
                        <div className="flex items-center justify-between mb-2 gap-2">
                          <input value={p.name} onChange={(e) => props.updateProfile(p.id, 'name', e.target.value)}
                            className="bg-suse-panel border border-suse-border rounded px-2 py-1 text-sm font-bold text-gray-100 focus:border-suse-green focus:outline-none w-full" />
                          {(state.nodeProfiles || []).length > 1 && <button onClick={() => props.removeProfile(p.id)} className="text-red-400 hover:text-red-300 flex-shrink-0"><Trash2 size={15} /></button>}
                        </div>
                        <div className="grid grid-cols-4 gap-2">
                          <NumberField label="vCPU" value={p.cpu} onChange={(v) => props.updateProfile(p.id, 'cpu', v)} />
                          <NumberField label="RAM GB" value={p.ram} onChange={(v) => props.updateProfile(p.id, 'ram', v)} />
                          <NumberField label="Stor GB" value={p.storage} onChange={(v) => props.updateProfile(p.id, 'storage', v)} />
                          <NumberField label="GPUs" value={p.gpus || 0} onChange={(v) => props.updateProfile(p.id, 'gpus', v)} />
                        </div>
                      </div>
                    ))}
                  </div>
                </Panel>
              </div>

              <div>
                <SectionLabel icon={Server}>Base Cluster Nodes</SectionLabel>
                <div className="space-y-4">
                  {baseOrder.map(key => (
                    <BaseGroup key={key} groupKey={key} group={cluster.base[key]} gpuDemand={summary.demand.gpu} gpuDelta={summary.deltas.gpu} {...props} />
                  ))}
                </div>
              </div>

              <div>
                <SectionLabel icon={Layers}>Additional Services</SectionLabel>

                {isObs && (
                  <div className="bg-violet-500/10 border border-violet-500/30 text-violet-200 rounded-lg p-3 flex items-start justify-between gap-3 text-xs mb-4">
                    <div className="flex items-start"><Info size={16} className="mr-2 mt-0.5 flex-shrink-0" />
                      <div>This is the dedicated <strong>Observability</strong> cluster. Size its control plane and workers below; the SUSE Observability profile sets the demand.</div></div>
                    <button onClick={props.removeObsCluster} className="flex-shrink-0 px-2.5 py-1.5 rounded-md border border-violet-400/50 text-violet-100 hover:bg-violet-500/20 whitespace-nowrap">Merge back</button>
                  </div>
                )}

                {suggestObs && (
                  <div className="bg-suse-green/10 border border-suse-green/30 text-suse-green rounded-lg p-3 flex items-start justify-between gap-3 text-xs mb-4">
                    <div className="flex items-start"><CheckCircle size={16} className="mr-2 mt-0.5 flex-shrink-0" />
                      <div><strong>Recommended:</strong> run SUSE Observability in its own cluster. We'll create a dedicated, right-sized Observability cluster and remove its demand from your downstream clusters.</div></div>
                    <button onClick={props.createObsCluster} className="flex-shrink-0 px-2.5 py-1.5 rounded-md border border-suse-green/50 text-suse-green hover:bg-suse-green/20 whitespace-nowrap flex items-center"><Plus size={13} className="mr-1" />Create cluster</button>
                  </div>
                )}

                {obsCluster && isWorkload && (
                  <div className="bg-violet-500/10 border border-violet-500/30 text-violet-200 rounded-lg p-3 flex items-start justify-between gap-3 text-xs mb-4">
                    <div className="flex items-start"><Info size={16} className="mr-2 mt-0.5 flex-shrink-0" />
                      <div>SUSE Observability runs in the dedicated <strong>{obsCluster.name}</strong> cluster, so it's not sized per downstream cluster here.</div></div>
                    <button onClick={() => props.selectCluster(obsCluster.id)} className="flex-shrink-0 px-2.5 py-1.5 rounded-md border border-violet-400/50 text-violet-100 hover:bg-violet-500/20 whitespace-nowrap">Edit it</button>
                  </div>
                )}

                <div className="bg-sky-500/10 border border-sky-500/30 text-sky-200 rounded-lg p-3 flex items-start text-xs mb-4">
                  <Info size={16} className="mr-2 mt-0.5 flex-shrink-0" />
                  <div>A subset of available services is shown. For the full catalog, visit the <a href="https://apps.rancher.com" target="_blank" rel="noopener noreferrer" className="font-bold underline">SUSE Application Collection</a>.</div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                  {Object.entries(servicesData)
                    .filter(([id]) => !(id === 'observability' && obsCluster && isWorkload))
                    .map(([id, data]) => (
                    <ServiceCard key={id} id={id} data={data} sel={cluster.services[id]} setService={props.setService} />
                  ))}
                </div>
              </div>

              <div>
                <SectionLabel icon={Edit3} right={
                  <div className="flex items-center gap-2">
                    <button onClick={props.openCatalog} className="text-xs flex items-center px-2.5 py-1.5 rounded-md border border-suse-border text-gray-400 hover:text-suse-green hover:border-suse-green transition-colors"><PackageIcon size={13} className="mr-1.5"/>Browse Catalog</button>
                    <button onClick={props.addCustomApp} className="text-xs flex items-center text-suse-green hover:text-emerald-300"><Plus size={14} className="mr-1" />Add manually</button>
                  </div>
                }>Custom Applications</SectionLabel>
                {cluster.customApps.length === 0 ? (
                  <Panel className="p-6 text-center border-dashed">
                    <p className="text-sm text-gray-500 mb-3">No custom apps yet.</p>
                    <button onClick={props.openCatalog} className="mx-auto flex items-center gap-2 px-4 py-2 rounded-lg border border-suse-green/40 text-suse-green text-sm hover:bg-suse-green/10 transition-colors"><PackageIcon size={16}/>Browse App Catalog</button>
                  </Panel>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    {cluster.customApps.map(app => (
                      <CustomAppCard key={app.id} app={app} update={props.updateCustomApp} remove={props.removeCustomApp} />
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* Sticky live summary */}
            <div className="lg:col-span-1">
              <div className="lg:sticky lg:top-32 space-y-4">
                <Panel className="p-5">
                  <SectionLabel icon={ClipboardList}>This Cluster — {cluster.name}</SectionLabel>
                  <LiveTotals summary={summary} />
                </Panel>
                <Panel className="p-5">
                  <h4 className="text-xs uppercase text-gray-500 font-bold tracking-wider mb-3">Headroom (Capacity − Demand)</h4>
                  <div className="grid grid-cols-2 gap-3">
                    <DeltaStat icon={Cpu} label="vCPU" value={summary.deltas.cpu} />
                    <DeltaStat icon={MemoryStick} label="RAM GB" value={summary.deltas.ram} />
                    <DeltaStat icon={HardDrive} label="Storage GB" value={summary.deltas.storage} />
                    <DeltaStat icon={Layers} label="GPU" value={summary.deltas.gpu} />
                  </div>
                </Panel>
                <Panel className="p-5 border-suse-green/40">
                  <SectionLabel icon={Layers}>Fleet Total — {fleet.clusterCount} cluster{fleet.clusterCount !== 1 ? 's' : ''}</SectionLabel>
                  <LiveTotals summary={fleet} />
                </Panel>
              </div>
            </div>
          </div>
        );
      }

      const accentMap = {
        sky: 'text-sky-400 border-sky-500/40',
        violet: 'text-violet-400 border-violet-500/40',
        emerald: 'text-suse-green border-suse-green/40',
      };

      function BaseGroup({ groupKey, group, toggleCustom, setCount, addNode, removeNode, updateNode, setGroupEnabled, setFaultTolerance, setGroupProfile, state, gpuDemand, gpuDelta }) {
        const meta = baseComponentData[groupKey];
        const Icon = meta.icon;
        const isGpu = groupKey === 'gpuWorkerNodes';
        const isCp = groupKey === 'controlPlane';
        const enabled = group.enabled !== false;
        const ft = Math.max(0, group.faultTolerance || 0);
        const profiles = state.nodeProfiles || [];
        const totals = effNodes(group).reduce((a, n) => ({ cpu: a.cpu + n.cpu, ram: a.ram + n.ram, storage: a.storage + n.storage, gpus: a.gpus + (n.gpus||0) }), { cpu:0,ram:0,storage:0,gpus:0 });
        const totalNodes = group.nodes.length + (enabled ? ft : 0);

        return (
          <Panel className={`p-5 ${enabled ? '' : 'opacity-60'}`}>
            <div className="flex items-start justify-between gap-3 mb-4">
              <div className="flex items-center">
                <div className={`h-9 w-9 rounded-lg bg-suse-bg border flex items-center justify-center mr-3 ${accentMap[meta.accent]}`}><Icon size={18} /></div>
                <div>
                  <h3 className="font-bold text-white">{meta.name}</h3>
                  {enabled ? (
                    <p className="text-xs text-gray-500">{totalNodes} node{totalNodes !== 1 ? 's' : ''}{ft ? ` (${group.nodes.length}+${ft} FT)` : ''} · {totals.cpu} vCPU · {totals.ram} GB{totals.gpus ? ` · ${totals.gpus} GPU` : ''}</p>
                  ) : (
                    <p className="text-xs text-amber-400/80">Disabled — excluded from totals</p>
                  )}
                </div>
              </div>
              <div className="flex items-center gap-3">
                {/* Enable / disable the whole node group (e.g. CPU-only deployments turn off GPU workers). */}
                <label className="flex items-center gap-2 text-xs text-gray-400 cursor-pointer select-none whitespace-nowrap" title="Include this node group in the cluster">
                  <span>{enabled ? 'On' : 'Off'}</span>
                  <input type="checkbox" checked={enabled} onChange={(e) => setGroupEnabled(groupKey, e.target.checked)} className="sr-only peer" />
                  <span className="w-9 h-5 bg-suse-bg border border-suse-border rounded-full relative peer-checked:bg-suse-green/30 peer-checked:border-suse-green after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:w-4 after:h-4 after:rounded-full after:bg-gray-400 peer-checked:after:bg-suse-green after:transition-all peer-checked:after:translate-x-4"></span>
                </label>
                <label className={`flex items-center gap-2 text-xs text-gray-400 select-none whitespace-nowrap ${enabled ? 'cursor-pointer' : 'opacity-50 pointer-events-none'}`}>
                  <span>Per-node</span>
                  <input type="checkbox" checked={group.custom} disabled={!enabled} onChange={(e) => toggleCustom(groupKey, e.target.checked)} className="sr-only peer" />
                  <span className="w-9 h-5 bg-suse-bg border border-suse-border rounded-full relative peer-checked:bg-suse-green/30 peer-checked:border-suse-green after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:w-4 after:h-4 after:rounded-full after:bg-gray-400 peer-checked:after:bg-suse-green after:transition-all peer-checked:after:translate-x-4"></span>
                </label>
              </div>
            </div>

            {!enabled ? null : !group.custom ? (
              <div className="space-y-4">
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 items-end">
                  <div className="sm:col-span-1">
                    <label className="block text-xs text-gray-400 mb-1">Node profile</label>
                    <select value={group.profileId || ''} onChange={(e) => setGroupProfile(groupKey, e.target.value)}
                      className="w-full bg-suse-bg border border-suse-border rounded px-2 py-2 text-sm text-gray-200 focus:border-suse-green focus:outline-none">
                      {profiles.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                    </select>
                  </div>
                  <NumberField label="Number of nodes" value={group.nodes.length} min={1} onChange={(v) => setCount(groupKey, v)} />
                  <NumberField label="Fault tolerance (N + x spares)" value={ft} min={0} onChange={(v) => setFaultTolerance(groupKey, v)} />
                </div>
                <div className="bg-suse-bg border border-suse-border rounded-md p-3">
                  <p className="text-[11px] text-gray-500 mb-1.5">Per node (from profile)</p>
                  <div className="flex flex-wrap gap-2">
                    <Pill icon={Cpu}>{group.nodes[0].cpu} vCPU</Pill>
                    <Pill icon={MemoryStick}>{group.nodes[0].ram} GB</Pill>
                    <Pill icon={HardDrive}>{group.nodes[0].storage} GB</Pill>
                    {isGpu && <Pill icon={Layers}>{group.nodes[0].gpus || 0} GPU</Pill>}
                  </div>
                </div>
              </div>
            ) : (
              <div className="space-y-2">
                <div className="mb-1"><NumberField label="Fault tolerance (N + x spares)" value={ft} min={0} onChange={(v) => setFaultTolerance(groupKey, v)} /></div>
                {group.nodes.map((n, i) => (
                  <div key={n.id} className="bg-suse-bg border border-suse-border rounded-md p-3">
                    <div className="flex items-center justify-between mb-2">
                      <span className="text-xs font-bold text-gray-300 flex items-center"><Server size={13} className="mr-1.5 text-gray-500" />Node {i + 1}</span>
                      {group.nodes.length > 1 && <button onClick={() => removeNode(groupKey, n.id)} className="text-red-400 hover:text-red-300"><Trash2 size={14} /></button>}
                    </div>
                    <div className={`grid grid-cols-2 ${isGpu ? 'sm:grid-cols-4' : 'sm:grid-cols-3'} gap-2`}>
                      <NumberField label="vCPU" value={n.cpu} onChange={(v) => updateNode(groupKey, n.id, 'cpu', v)} />
                      <NumberField label="RAM GB" value={n.ram} onChange={(v) => updateNode(groupKey, n.id, 'ram', v)} />
                      <NumberField label="Storage GB" value={n.storage} onChange={(v) => updateNode(groupKey, n.id, 'storage', v)} />
                      {isGpu && <NumberField label="GPUs" value={n.gpus} onChange={(v) => updateNode(groupKey, n.id, 'gpus', v)} />}
                    </div>
                  </div>
                ))}
                <button onClick={() => addNode(groupKey)} className="w-full py-2 rounded-md border border-dashed border-suse-border text-suse-green text-xs hover:border-suse-green hover:bg-suse-green/5 flex items-center justify-center"><Plus size={14} className="mr-1.5" />Add node</button>
              </div>
            )}

            {isCp && enabled && totalNodes < 3 && (
              <div className="mt-3 bg-amber-500/10 border border-amber-500/30 text-amber-200 rounded-md p-3 flex items-start text-xs">
                <AlertTriangle size={16} className="mr-2 mt-0.5 flex-shrink-0" />
                <div>A minimum of 3 control plane nodes is recommended for etcd quorum and API redundancy in a production HA cluster.</div>
              </div>
            )}
            {isGpu && enabled && (
              <div className={`mt-3 rounded-md p-3 flex items-start text-xs border ${gpuDelta >= 0 ? 'bg-suse-green/10 border-suse-green/30 text-suse-green' : 'bg-amber-500/10 border-amber-500/30 text-amber-200'}`}>
                {gpuDelta >= 0 ? <CheckCircle size={16} className="mr-2 mt-0.5 flex-shrink-0" /> : <AlertTriangle size={16} className="mr-2 mt-0.5 flex-shrink-0" />}
                <div><strong>GPUs required by services: {gpuDemand}.</strong> Cluster provides {totals.gpus}.{gpuDelta < 0 && ` Deficit of ${Math.abs(gpuDelta)} GPU(s).`}</div>
              </div>
            )}
          </Panel>
        );
      }

      function ServiceCard({ id, data, sel, setService }) {
        const Icon = data.icon;
        const profile = data.profiles[sel.profile];
        return (
          <div className={`border rounded-lg p-4 transition-all ${sel.selected ? 'border-suse-green bg-suse-green/5' : 'border-suse-border bg-suse-panel'}`}>
            <label className="flex items-center justify-between cursor-pointer">
              <span className="flex items-center">
                <span className={`mr-3 ${sel.selected ? 'text-suse-green' : 'text-gray-500'}`}><Icon size={20} /></span>
                <span className="font-bold text-sm text-gray-100">{data.name}</span>
              </span>
              <input type="checkbox" checked={sel.selected} onChange={(e) => setService(id, 'selected', e.target.checked)} className="h-4 w-4 rounded border-suse-border bg-suse-bg text-suse-green focus:ring-0 cursor-pointer" />
            </label>
            {sel.selected && (
              <div className="mt-3 pt-3 border-t border-suse-green/20 space-y-3">
                <p className="text-xs text-gray-400 leading-relaxed">{data.description}</p>
                {Object.keys(data.profiles).length > 1 && (
                  <select value={sel.profile} onChange={(e) => setService(id, 'profile', e.target.value)}
                    className="w-full bg-suse-bg border border-suse-border rounded px-2 py-1.5 text-xs text-gray-200 focus:border-suse-green focus:outline-none">
                    {Object.entries(data.profiles).map(([pid, p]) => <option key={pid} value={pid}>{p.name}</option>)}
                  </select>
                )}
                <div className="flex flex-wrap gap-2">
                  <Pill icon={Cpu}>{profile.cpu} vCPU</Pill>
                  <Pill icon={MemoryStick}>{profile.ram} GB</Pill>
                  <Pill icon={HardDrive}>{profile.storage} GB</Pill>
                  {profile.gpu ? <Pill icon={Layers} tone="green">{profile.gpu} GPU</Pill> : null}
                </div>
                {profile.storageNote && <p className="text-[11px] text-gray-500 italic">{profile.storageNote}</p>}
              </div>
            )}
          </div>
        );
      }

      function CustomAppCard({ app, update, remove }) {
        return (
          <div className="border border-suse-green/40 bg-suse-green/5 rounded-lg p-4">
            <div className="flex items-center justify-between mb-3">
              <input value={app.name} onChange={(e) => update(app.id, 'name', e.target.value)}
                className="bg-suse-bg border border-suse-border rounded px-2 py-1 text-sm font-bold text-gray-100 focus:border-suse-green focus:outline-none w-full mr-2" />
              <button onClick={() => remove(app.id)} className="text-red-400 hover:text-red-300 flex-shrink-0"><Trash2 size={16} /></button>
            </div>
            <div className="grid grid-cols-2 gap-2">
              <NumberField label="vCPU" value={app.cpu} onChange={(v) => update(app.id, 'cpu', v)} />
              <NumberField label="RAM GB" value={app.ram} onChange={(v) => update(app.id, 'ram', v)} />
              <NumberField label="Storage GB" value={app.storage} onChange={(v) => update(app.id, 'storage', v)} />
              <NumberField label="GPUs" value={app.gpu} onChange={(v) => update(app.id, 'gpu', v)} />
            </div>
          </div>
        );
      }


      /* =====================================================================
         CATALOG BROWSER (overlay)
      ===================================================================== */
      function CatalogBrowser({ onClose, onAdd }) {
        const [search, setSearch] = React.useState('');
        const [cat, setCat] = React.useState('All');
        const [apiKey, setApiKey] = React.useState(() => { try { return localStorage.getItem('suse-ai-anthropic-key') || ''; } catch(e) { return ''; } });
        const [showKey, setShowKey] = React.useState(false);
        const [aiState, setAiState] = React.useState(null); // null | 'loading' | {result} | {error}

        const saveKey = (k) => { setApiKey(k); try { localStorage.setItem('suse-ai-anthropic-key', k); } catch(e) {} };

        const filtered = APP_CATALOG.filter(a => {
          const mCat = cat === 'All' || a.cat === cat;
          const q = search.toLowerCase();
          const mQ = !q || a.name.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q);
          return mCat && mQ;
        });

        const lookupAI = async () => {
          if (!apiKey.trim()) { setShowKey(true); return; }
          setAiState('loading');
          try {
            const resp = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': apiKey.trim(),
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-allow-browser': 'true',
              },
              body: JSON.stringify({
                model: 'claude-haiku-4-5-20251001',
                max_tokens: 256,
                system: 'Return ONLY a valid JSON object — no markdown fences, no explanation.',
                messages: [{ role: 'user', content: `Provide Kubernetes resource sizing for: "${search}". Return JSON: {"name":"<display name>","description":"<one sentence>","cpu":<int vCPU>,"ram":<int GB>,"storage":<int GB>,"gpu":<int GPUs, usually 0>}. Use conservatively-sized production estimates.` }]
              })
            });
            if (!resp.ok) throw new Error(`API ${resp.status}`);
            const data = await resp.json();
            const text = (data.content?.[0]?.text || '').replace(/```json|```/g,'').trim();
            const parsed = JSON.parse(text);
            setAiState({ result: parsed });
          } catch(e) {
            setAiState({ error: e.message || 'AI lookup failed' });
          }
        };

        const addAiResult = () => {
          if (aiState?.result) onAdd({ name: aiState.result.name || search, cpu: aiState.result.cpu || 2, ram: aiState.result.ram || 4, storage: aiState.result.storage || 20, gpu: aiState.result.gpu || 0 });
        };

        return (
          <div className="fixed inset-0 z-50 flex items-start justify-center pt-16 px-4" style={{ background: 'rgba(0,0,0,0.7)' }} onClick={(e) => e.target === e.currentTarget && onClose()}>
            <div className="bg-suse-panel border border-suse-border rounded-2xl shadow-2xl w-full max-w-3xl max-h-[80vh] flex flex-col overflow-hidden">
              {/* header */}
              <div className="flex items-center justify-between px-5 py-4 border-b border-suse-border">
                <h2 className="font-bold text-white flex items-center"><PackageIcon size={18} className="mr-2 text-suse-green"/>App Catalog</h2>
                <div className="flex items-center gap-2">
                  <button onClick={() => setShowKey(!showKey)} className={`text-xs flex items-center px-2.5 py-1.5 rounded-md border transition-colors ${showKey ? 'border-suse-green text-suse-green' : 'border-suse-border text-gray-400 hover:text-suse-green hover:border-suse-green'}`}><Settings size={13} className="mr-1.5"/>AI Key</button>
                  <button onClick={onClose} className="text-gray-400 hover:text-white"><XCircle size={20}/></button>
                </div>
              </div>

              {/* API key row */}
              {showKey && (
                <div className="px-5 py-3 border-b border-suse-border bg-suse-bg/60 flex items-center gap-3">
                  <KeyIcon size={16} className="text-suse-green flex-shrink-0"/>
                  <input type="password" value={apiKey} onChange={e => saveKey(e.target.value)} placeholder="Anthropic API key (sk-ant-…) — stored locally, never sent to our servers"
                    className="flex-1 bg-suse-bg border border-suse-border rounded px-3 py-1.5 text-sm text-gray-200 focus:border-suse-green focus:outline-none font-mono"/>
                  {apiKey && <span className="text-xs text-suse-green flex items-center"><CheckCircle size={13} className="mr-1"/>Saved</span>}
                </div>
              )}

              {/* search bar + categories */}
              <div className="px-5 pt-4 pb-3 space-y-3">
                <div className="flex items-center bg-suse-bg border border-suse-border rounded-lg px-3 focus-within:border-suse-green transition-colors">
                  <Search size={16} className="text-gray-500 mr-2 flex-shrink-0"/>
                  <input autoFocus value={search} onChange={e => { setSearch(e.target.value); setAiState(null); }}
                    placeholder="Search apps…"
                    className="flex-1 bg-transparent py-2.5 text-sm text-gray-100 focus:outline-none"/>
                  {search && <button onClick={() => { setSearch(''); setAiState(null); }} className="text-gray-500 hover:text-gray-200"><XCircle size={15}/></button>}
                </div>
                <div className="flex flex-wrap gap-1.5">
                  {CATALOG_CATEGORIES.map(c => (
                    <button key={c} onClick={() => setCat(c)} className={`text-xs px-3 py-1 rounded-full border transition-colors ${cat === c ? 'bg-suse-green text-white border-suse-green' : 'text-gray-400 border-suse-border hover:border-suse-green hover:text-suse-green'}`}>{c}</button>
                  ))}
                </div>
              </div>

              {/* results */}
              <div className="flex-1 overflow-y-auto px-5 pb-4 space-y-2">
                {filtered.length > 0 ? filtered.map(app => {
                  const Icon = CAT_ICONS[app.cat] || PackageIcon;
                  return (
                    <div key={app.id} className="flex items-start gap-3 bg-suse-bg border border-suse-border rounded-lg p-3 hover:border-suse-green/50 transition-colors">
                      <div className="h-9 w-9 rounded-md bg-suse-panel border border-suse-border flex items-center justify-center flex-shrink-0 text-suse-green"><Icon size={18}/></div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="font-bold text-sm text-white">{app.name}</span>
                          <span className="text-[10px] text-gray-500 bg-suse-panel border border-suse-border rounded px-1.5 py-0.5">{app.cat}</span>
                        </div>
                        <p className="text-xs text-gray-400 mt-0.5 leading-relaxed">{app.desc}</p>
                        <div className="flex flex-wrap gap-2 mt-2">
                          <Pill icon={Cpu}>{app.cpu} vCPU</Pill>
                          <Pill icon={MemoryStick}>{app.ram} GB</Pill>
                          <Pill icon={HardDrive}>{app.storage} GB</Pill>
                          {app.gpu > 0 && <Pill icon={Layers} tone="green">{app.gpu} GPU</Pill>}
                        </div>
                      </div>
                      <button onClick={() => onAdd({ name: app.name, cpu: app.cpu, ram: app.ram, storage: app.storage, gpu: app.gpu })}
                        className="flex-shrink-0 px-3 py-1.5 rounded-md bg-suse-green/10 border border-suse-green/40 text-suse-green text-xs font-bold hover:bg-suse-green hover:text-white transition-colors flex items-center">
                        <Plus size={13} className="mr-1"/>Add
                      </button>
                    </div>
                  );
                }) : (
                  <div className="py-6 text-center">
                    <p className="text-gray-500 text-sm mb-4">{search ? `No catalog entry for "${search}".` : 'No results.'}</p>
                    {search && (
                      <div className="space-y-3">
                        {aiState === 'loading' && (
                          <div className="flex items-center justify-center gap-2 text-sm text-suse-green">
                            <svg className="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                            Asking Claude…
                          </div>
                        )}
                        {aiState?.result && (
                          <div className="bg-suse-green/10 border border-suse-green/30 rounded-lg p-4 text-left">
                            <p className="text-suse-green text-xs font-bold mb-1 flex items-center"><Brain size={13} className="mr-1.5"/>AI sizing estimate</p>
                            <p className="text-white font-bold text-sm">{aiState.result.name || search}</p>
                            <p className="text-xs text-gray-400 mt-0.5 mb-2">{aiState.result.description || ''}</p>
                            <div className="flex flex-wrap gap-2 mb-3">
                              <Pill icon={Cpu}>{aiState.result.cpu} vCPU</Pill>
                              <Pill icon={MemoryStick}>{aiState.result.ram} GB</Pill>
                              <Pill icon={HardDrive}>{aiState.result.storage} GB</Pill>
                              {aiState.result.gpu > 0 && <Pill icon={Layers} tone="green">{aiState.result.gpu} GPU</Pill>}
                            </div>
                            <button onClick={addAiResult} className="px-4 py-1.5 rounded-md bg-suse-green text-white text-xs font-bold hover:bg-emerald-500 transition-colors flex items-center"><Plus size={13} className="mr-1"/>Add to cluster</button>
                          </div>
                        )}
                        {aiState?.error && <p className="text-red-300 text-xs bg-red-500/10 border border-red-500/30 rounded px-3 py-2">{aiState.error}</p>}
